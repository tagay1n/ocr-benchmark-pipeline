<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout benchmark | OCR benchmark pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <style>
      :root {
        --bg: #f3f1eb;
        --surface: #fffdf7;
        --ink: #1e1f1c;
        --muted: #63635f;
        --accent: #0b7a75;
        --danger: #a52222;
        --border: #e0dccf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 100% 0, #d6ebe7 0, transparent 30%),
          radial-gradient(circle at 0 100%, #f7e3cf 0, transparent 32%),
          var(--bg);
      }

      main {
        position: relative;
        width: 100%;
        height: 100vh;
        padding: 8px 6px;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .nav-strip {
        position: fixed;
        top: 8px;
        left: 6px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        z-index: 45;
      }

      .back-nav {
        width: 44px;
        height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(31, 35, 41, 0.08);
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .back-nav:hover {
        background: #f5f1e6;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 4px;
        padding-bottom: 8px;
        padding-left: 62px;
        background: rgba(243, 241, 235, 0.9);
        backdrop-filter: blur(1px);
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .content-scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding-top: 6px;
      }

      button,
      a.button-link {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }

      button.secondary,
      a.button-link.secondary {
        background: #fff;
        color: var(--accent);
      }

      button.danger {
        border-color: var(--danger);
        background: var(--danger);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #benchmark-toggle-btn.is-busy,
      #benchmark-rescore-btn.is-busy {
        position: relative;
        color: transparent;
      }

      #benchmark-toggle-btn.is-busy::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-top-color: #ffffff;
        animation: spin 720ms linear infinite;
      }

      #benchmark-rescore-btn.is-busy::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(11, 122, 117, 0.35);
        border-top-color: var(--accent);
        animation: spin 720ms linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(140px, 1fr));
        gap: 8px;
      }

      .summary-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: #f5f2e8;
      }

      .summary-item-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }

      .summary-item-value {
        font-size: 15px;
        font-weight: 600;
      }

      .summary-item.best-config {
        background: #efe9d7;
        border-color: #decd9d;
      }

      .summary-item.best-config .summary-item-label {
        color: #6f5715;
      }

      .summary-item.best-config .summary-item-value {
        color: #5e4a12;
      }

      .view-tabs {
        display: inline-flex;
        gap: 6px;
        margin-bottom: 10px;
      }

      .tab-btn {
        border: 1px solid var(--border);
        background: #ece8df;
        color: var(--ink);
        border-radius: 10px;
        padding: 7px 12px;
        font-weight: 600;
      }

      .tab-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .tab-panel[hidden] {
        display: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 13px;
      }

      tr.best-row {
        background: #e5f1ed;
      }

      tr.current-row {
        outline: 2px solid #7aaea1;
        outline-offset: -2px;
      }

      .row-state {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .row-state.running {
        background: #e8f3f0;
        border-color: #b9d8cc;
        color: #1c5e4f;
      }

      .row-state.best {
        background: #efe9d7;
        border-color: #decd9d;
        color: #6f5715;
      }

      .explorer-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .explorer-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .explorer-control label {
        color: var(--muted);
        font-size: 13px;
      }

      .explorer-control select {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 5px 8px;
        min-width: 110px;
      }

      .explorer-caption {
        color: var(--muted);
        margin-bottom: 8px;
      }

      .heatmap-wrap {
        overflow: auto;
      }

      .heatmap-table {
        width: max-content;
        min-width: 100%;
        border-collapse: separate;
        border-spacing: 2px;
      }

      .heatmap-table th,
      .heatmap-table td {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 8px;
        text-align: center;
        vertical-align: middle;
        min-width: 120px;
        background: #f5f2e8;
      }

      .heatmap-table th {
        color: var(--muted);
        font-size: 12px;
      }

      .heatmap-cell.is-empty {
        color: var(--muted);
        background: #f8f6f0;
      }

      .heatmap-score {
        display: block;
        font-weight: 700;
      }

      .heatmap-pages {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .heatmap-markers {
        display: inline-flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .heatmap-marker {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 1px 6px;
        font-size: 11px;
        font-weight: 700;
      }

      .heatmap-marker.running {
        color: #1c5e4f;
        border-color: #b9d8cc;
        background: #e8f3f0;
      }

      .heatmap-marker.best {
        color: #6f5715;
        border-color: #decd9d;
        background: #efe9d7;
      }

      .class-metrics-section {
        margin-top: 12px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }

      .class-metrics-controls {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .class-metrics-controls label {
        color: var(--muted);
        font-size: 13px;
      }

      .class-metrics-controls select {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 5px 8px;
        min-width: 260px;
        max-width: min(100vw - 64px, 760px);
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 980px) {
        .nav-strip {
          top: 16px;
          left: 16px;
        }

        .back-nav {
          width: 40px;
          height: 40px;
        }

        .nav-icon {
          width: 18px;
          height: 18px;
        }

        .header {
          padding-left: 56px;
        }

        .summary-grid {
          grid-template-columns: repeat(2, minmax(140px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav-strip">
        <a class="back-nav" href="/" aria-label="Back to Dashboard" title="Back to Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10 7 5 12l5 5"></path>
            <path d="M5 12h9a5 5 0 0 0 0-10h-2"></path>
          </svg>
        </a>
      </div>
      <section class="header">
        <h1>Layout benchmark</h1>
        <div class="header-actions">
          <button id="benchmark-rescore-btn" class="secondary" type="button">Recalculate score</button>
          <button id="benchmark-toggle-btn" type="button">Start benchmark</button>
          <label for="benchmark-force-rerun-toggle">
            <input id="benchmark-force-rerun-toggle" type="checkbox" />
            Force full rerun
          </label>
        </div>
      </section>
      <div class="content-scroll">
        <section class="panel">
          <div class="summary-grid">
            <div class="summary-item best-config">
              <div class="summary-item-label">Best config</div>
              <div id="benchmark-best-config" class="summary-item-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">Run status</div>
              <div id="benchmark-run-status" class="summary-item-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">Processed tasks</div>
              <div id="benchmark-processed-tasks" class="summary-item-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">Skipped tasks</div>
              <div id="benchmark-skipped-tasks" class="summary-item-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">Current config</div>
              <div id="benchmark-current-config" class="summary-item-value">—</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="view-tabs" role="tablist" aria-label="Benchmark views">
            <button
              id="benchmark-view-leaderboard-btn"
              class="tab-btn active"
              type="button"
              role="tab"
              aria-selected="true"
            >
              Leaderboard
            </button>
            <button
              id="benchmark-view-explorer-btn"
              class="tab-btn"
              type="button"
              role="tab"
              aria-selected="false"
            >
              Explorer
            </button>
          </div>

          <div id="benchmark-leaderboard-panel" class="tab-panel" role="tabpanel">
            <table>
              <thead>
              <tr>
                <th>State</th>
                <th>Model</th>
                <th>Image size</th>
                <th>Conf</th>
                <th>Mean mAP50-95</th>
                <th>Min mAP50-95</th>
                <th>Std dev</th>
                <th>Hard-case mAP50-95</th>
              </tr>
            </thead>
              <tbody id="benchmark-grid-body"></tbody>
            </table>
          </div>

          <div id="benchmark-explorer-panel" class="tab-panel" role="tabpanel" hidden>
            <div id="benchmark-explorer-caption" class="explorer-caption">—</div>
            <div class="heatmap-wrap">
              <table class="heatmap-table">
                <thead id="benchmark-heatmap-head"></thead>
                <tbody id="benchmark-heatmap-body"></tbody>
              </table>
            </div>
          </div>
        </section>

      </div>
    </main>

    <script type="module" src="/static/js/layout_benchmark_page.mjs"></script>
  </body>
</html>
