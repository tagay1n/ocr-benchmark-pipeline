<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout review | OCR benchmark pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <style>
      :root {
        --bg: #f3f1eb;
        --surface: #fffdf7;
        --ink: #1e1f1c;
        --muted: #63635f;
        --accent: #0b7a75;
        --danger: #a52222;
        --border: #e0dccf;
        --class-col-size: 16ch;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 100% 0, #d6ebe7 0, transparent 30%),
          radial-gradient(circle at 0 100%, #f7e3cf 0, transparent 32%),
          var(--bg);
      }

      main {
        position: relative;
        width: 100%;
        height: 100vh;
        padding: 8px 6px;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .nav-strip {
        position: fixed;
        top: 8px;
        left: 6px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        z-index: 45;
      }

      .back-nav,
      .history-nav-btn {
        width: 44px;
        height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(31, 35, 41, 0.08);
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .back-nav:hover,
      .history-nav-btn:hover:not(:disabled) {
        background: #f5f1e6;
      }

      .history-nav-btn {
        cursor: pointer;
      }

      .history-nav-btn:disabled {
        opacity: 0.42;
        cursor: default;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 4px;
        padding-bottom: 8px;
        padding-left: 172px;
        background: rgba(243, 241, 235, 0.9);
        backdrop-filter: blur(1px);
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .header-title-row {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .subline {
        color: var(--muted);
      }

      .meta-strip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .review-state-badge {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--muted);
        background: #ece9df;
      }

      .review-state-badge.needs-review {
        color: #7a5a1d;
        border-color: #dfcba2;
        background: #f4ead2;
      }

      .review-state-badge.reviewed {
        color: #1c5e4f;
        border-color: #b9d8cc;
        background: #deeee7;
      }

      .review-state-badge.unknown {
        color: #4e4f49;
        border-color: #cfc8b7;
        background: #ece8df;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .order-controls {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .order-mode-select {
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 10px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 600;
      }

      .zoom-control {
        position: relative;
      }

      .magnifier-toggle-btn {
        width: 38px;
        height: 38px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        border: 1px solid var(--border);
        background: #ece8df;
        color: var(--ink);
      }

      .magnifier-toggle-btn:hover {
        background: #e3ddd1;
      }

      .magnifier-toggle-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .magnifier-icon {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-combo {
        display: inline-flex;
        position: relative;
        height: 38px;
        border: 1px solid #9aa99f;
        border-radius: 10px;
        overflow: hidden;
        background: var(--surface);
      }

      .zoom-percent-input {
        width: 58px;
        height: 100%;
        border: 0;
        padding: 0 8px;
        text-align: right;
        background: transparent;
        color: var(--ink);
        font-weight: 600;
      }

      .zoom-percent-input:focus {
        outline: none;
      }

      .zoom-caret-btn {
        width: 30px;
        height: 100%;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--border);
        border-radius: 0;
        background: #ece8df;
        color: var(--ink);
        font-size: 13px;
        line-height: 1;
        align-items: stretch;
      }

      .zoom-caret-btn:hover {
        background: #e3ddd1;
      }

      .zoom-caret {
        opacity: 0.75;
      }

      .zoom-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 172px;
        padding: 8px 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 14px 32px rgba(31, 35, 41, 0.14);
        z-index: 40;
      }

      .zoom-menu[hidden] {
        display: none;
      }

      .zoom-option {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: inherit;
        padding: 6px 12px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
      }

      .zoom-option:hover {
        background: #f0ece1;
      }

      .zoom-option.active::after {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }

      .zoom-separator {
        height: 1px;
        margin: 6px 0;
        background: var(--border);
      }

      button,
      a.button-link {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }

      button.secondary {
        background: var(--accent);
        color: #fff;
      }

      a.button-link.secondary {
        background: var(--accent);
        color: #fff;
      }

      button.danger {
        border-color: var(--danger);
        background: var(--danger);
      }

      .row-actions {
        display: inline-flex;
        flex-direction: row;
        align-items: center;
        gap: 3px;
        width: auto;
      }

      .icon-btn {
        width: 22px;
        min-width: 22px;
        height: 22px;
        padding: 0;
        line-height: 1;
        font-size: 12px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) fit-content(100%);
        grid-template-rows: minmax(0, 1fr);
        gap: 6px;
        align-items: stretch;
        flex: 1 1 auto;
        min-height: 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .image-panel {
        padding: 0;
        overflow: hidden;
        min-height: 0;
        display: flex;
      }

      .layouts-panel {
        width: fit-content;
        max-width: 100%;
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 32px);
        overflow: auto;
      }

      .layouts-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .layouts-header h2 {
        margin: 0;
      }

      .layouts-header-tools {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .layouts-add-btn {
        width: 36px;
        height: 36px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .layouts-add-btn.active {
        background: #0a6d68;
        border-color: #0a6d68;
      }

      .layouts-add-btn-icon {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .layouts-panel table {
        width: auto;
      }

      .layouts-panel th,
      .layouts-panel td {
        white-space: nowrap;
      }

      .layout-class-select {
        width: 100%;
      }

      .layout-class-col {
        width: var(--class-col-size);
        min-width: var(--class-col-size);
      }

      .layout-class-cell {
        vertical-align: top;
      }

      .layout-order-col {
        width: 3ch;
        min-width: 3ch;
        text-align: right;
        vertical-align: top;
      }

      .layout-order-value-btn {
        width: 100%;
        min-width: 2ch;
        border: none;
        background: transparent;
        padding: 2px 0;
        margin: 0;
        color: inherit;
        text-align: right;
        font: inherit;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum";
        cursor: text;
      }

      .layout-order-edit-input {
        width: 100%;
        min-width: 2ch;
        padding: 2px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: inherit;
        text-align: right;
        font: inherit;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum";
      }

      .layout-actions-col {
        width: auto;
        min-width: 0;
        text-align: right;
        vertical-align: top;
      }

      .layout-bbox-editor {
        display: none;
        margin-top: 4px;
        grid-template-columns: minmax(0, 1fr);
        gap: 4px 0;
      }

      .layout-bbox-editor.is-open {
        display: grid;
      }

      .bbox-field {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 12px;
        color: var(--muted);
      }

      .bbox-label {
        min-width: 18px;
      }

      .layout-bbox-input {
        width: 76px;
      }

      .caption-bind-summary {
        margin-top: 4px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
        max-width: 100%;
      }

      .caption-bind-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 100%;
        padding: 2px 6px;
        border: 1px solid #cfcbc0;
        border-radius: 999px;
        background: #f3efe4;
        color: #2e2f2c;
        font-size: 12px;
      }

      .caption-bind-chip-label {
        max-width: 11ch;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .caption-bind-chip-remove {
        width: 18px;
        height: 18px;
        min-width: 18px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid #bb6a6a;
        background: #f6e7e7;
        color: #8a2727;
        line-height: 1;
        font-size: 12px;
      }

      .caption-bind-chip-remove:hover {
        background: #f1dcdc;
      }


      .image-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        max-height: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: auto;
        background: #f7f5ef;
      }

      .image-wrap {
        position: relative;
        width: max-content;
        margin: 24px auto 0;
      }

      #page-image {
        display: block;
        width: auto;
        height: auto;
        max-width: none;
      }

      #overlay {
        position: absolute;
        inset: 0;
      }

      #bind-lines-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .overlap-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      #cursor-guides-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 4;
      }

      .cursor-guide-line {
        position: absolute;
        pointer-events: none;
        background: rgba(33, 41, 47, 0.22);
        opacity: 0.75;
      }

      .cursor-guide-line[hidden] {
        display: none;
      }

      .cursor-guide-line.horizontal {
        left: 0;
        height: 1px;
      }

      .cursor-guide-line.vertical {
        top: 0;
        width: 1px;
      }

      .overlap-segment {
        position: absolute;
        border-radius: 2px;
        opacity: 0.92;
        box-shadow: 0 0 0 1px rgba(131, 37, 37, 0.14);
      }

      .draw-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .draw-layer[hidden] {
        display: none;
      }

      .draw-layer.active {
        pointer-events: auto;
        cursor: crosshair;
      }

      .draw-preview-box {
        position: absolute;
        border: 2px dashed var(--accent);
        background: rgba(11, 122, 117, 0.12);
        border-radius: 4px;
        pointer-events: none;
      }

      .box {
        position: absolute;
        border: 1px solid #0b7a75;
        background: rgba(11, 122, 117, 0.12);
        border-radius: 4px;
        cursor: default;
        touch-action: none;
        z-index: 1;
      }

      .box-label {
        position: absolute;
        top: calc(-20px * var(--overlay-badge-scale, 1));
        left: 0;
        font-size: calc(12px * var(--overlay-badge-scale, 1));
        background: rgba(255, 253, 247, 0.58);
        color: #1e1f1c;
        border: 1px solid #cfc8b7;
        border-radius: calc(6px * var(--overlay-badge-scale, 1));
        padding: calc(2px * var(--overlay-badge-scale, 1)) calc(6px * var(--overlay-badge-scale, 1));
        white-space: nowrap;
        pointer-events: none;
      }

      .box-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        border: 1px solid rgba(20, 25, 25, 0.55);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 2px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.9);
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .box.layout-selected {
        z-index: 2;
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(30, 31, 28, 0.38);
      }

      .box.binding-caption-active {
        box-shadow: 0 0 0 2px rgba(73, 111, 152, 0.48);
      }

      .box.binding-target-candidate {
        cursor: pointer;
      }

      .box.binding-target-candidate:hover {
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.28);
      }

      .box.binding-target-linked {
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.48);
      }

      .box-corner-controls {
        position: absolute;
        top: calc((-22px * var(--overlay-badge-scale, 1)) - 3px);
        right: 0;
        z-index: 4;
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: calc(4px * var(--overlay-badge-scale, 1));
      }

      .box-overlay-btn {
        position: static;
        height: calc(20px * var(--overlay-badge-scale, 1));
        min-width: calc(22px * var(--overlay-badge-scale, 1));
        padding: 0;
        border-radius: calc(6px * var(--overlay-badge-scale, 1));
        border: 1px solid #c9d4e1;
        background: linear-gradient(180deg, #fdfefe 0%, #eef3fa 100%);
        color: #335779;
        font-size: calc(11px * var(--overlay-badge-scale, 1));
        font-family: "Segoe UI Symbol", "Noto Sans Symbols 2", "Noto Sans", sans-serif;
        font-weight: 600;
        line-height: 1;
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        box-shadow: 0 1px 2px rgba(48, 73, 106, 0.2);
      }

      .box-overlay-btn:hover {
        border-color: #aebed1;
        background: linear-gradient(180deg, #f6fbff 0%, #e8f1fb 100%);
        box-shadow: 0 1px 3px rgba(48, 73, 106, 0.24);
      }

      .box-bind-btn {
        /* inherits from .box-overlay-btn */
      }

      .box-bind-btn.active {
        border-color: #496f98;
        background: linear-gradient(180deg, #ebf2ff 0%, #dce8f8 100%);
        color: #294f77;
        opacity: 1;
        box-shadow: 0 1px 3px rgba(36, 74, 120, 0.28);
      }

      .box-orientation-btn {
        color: #2d4d66;
        height: calc(22px * var(--overlay-badge-scale, 1));
        min-width: calc(22px * var(--overlay-badge-scale, 1));
        font-size: calc(12px * var(--overlay-badge-scale, 1));
        border-radius: calc(7px * var(--overlay-badge-scale, 1));
      }

      .box.layout-selected .box-label {
        font-weight: 700;
      }

      .box.layout-selected .box-handle {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -50%) scale(1);
      }

      .box-handle.point-highlight {
        z-index: 3;
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -50%) scale(1.35);
        border-color: rgba(30, 31, 28, 0.9);
        background: rgba(255, 253, 247, 0.98);
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.35);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        text-align: left;
        padding: 8px 6px;
        vertical-align: top;
      }

      th {
        font-size: 13px;
        color: var(--muted);
      }

      #layouts-body tr.layout-selected td {
        background: #eeeadd;
      }

      #layouts-body tr.layout-selected td:first-child {
        box-shadow: inset 3px 0 0 var(--accent);
      }

      #layouts-body tr[draggable="true"] {
        cursor: grab;
      }

      #layouts-body tr.layout-dragging {
        opacity: 0.48;
      }

      #layouts-body tr.layout-drop-target td {
        background: #e7f1ee;
      }

      #layouts-body tr.layout-drop-target td:first-child {
        box-shadow: inset 3px 0 0 var(--accent);
      }

      input {
        width: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      select {
        width: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }

      .status-line {
        margin-top: 8px;
        color: var(--muted);
      }

      .error {
        color: var(--danger);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(18, 23, 25, 0.52);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 30;
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .modal-card {
        width: min(520px, 100%);
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      .modal-card h2 {
        margin: 0 0 8px;
      }

      .modal-hint {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .modal-doc-links {
        margin: -4px 0 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .modal-doc-links a {
        color: var(--accent);
        text-decoration: none;
      }

      .modal-doc-links a:hover {
        text-decoration: underline;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .modal-presets-field {
        margin-bottom: 10px;
      }

      .modal-divider {
        height: 1px;
        background: var(--border);
        margin: 0 0 12px;
      }

      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .modal-field-label-row {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .modal-field-checkbox-row {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .modal-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .modal-field input[type="checkbox"] {
        width: auto;
      }

      .field-help-btn {
        width: 20px;
        height: 20px;
        min-width: 20px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #ece8df;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .field-help-btn:hover {
        background: #e2ddd0;
      }

      .field-help-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: #dff0ec;
      }

      .field-help-cloud {
        position: absolute;
        min-width: 220px;
        max-width: min(300px, calc(100% - 16px));
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fffef9;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 8px 18px rgba(31, 35, 41, 0.14);
        z-index: 3;
      }

      .field-help-cloud::before {
        content: "";
        position: absolute;
        left: 18px;
        top: -6px;
        width: 10px;
        height: 10px;
        background: #fffef9;
        border-left: 1px solid var(--border);
        border-top: 1px solid var(--border);
        transform: rotate(45deg);
      }

      .field-help-cloud.up::before {
        top: auto;
        bottom: -6px;
        border-left: 0;
        border-top: 0;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .modal-actions {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      #detect-modal-run-btn {
        position: relative;
      }

      #detect-modal-run-btn.is-busy {
        padding-right: 34px;
      }

      #detect-modal-run-btn.is-busy::after {
        content: "";
        position: absolute;
        top: 50%;
        right: 12px;
        width: 14px;
        height: 14px;
        margin-top: -7px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.36);
        border-top-color: rgba(255, 255, 255, 0.96);
        animation: detect-modal-spin 720ms linear infinite;
      }

      @keyframes detect-modal-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .nav-strip {
          top: 16px;
          left: 16px;
          gap: 6px;
        }

        .back-nav,
        .history-nav-btn {
          width: 40px;
          height: 40px;
        }

        .nav-icon {
          width: 18px;
          height: 18px;
        }

        .header {
          padding-left: 136px;
        }

        .image-viewport {
          max-height: 68vh;
        }

        .modal-grid {
          grid-template-columns: 1fr;
        }

        .layouts-panel {
          position: static;
          max-height: none;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav-strip">
        <a class="back-nav" href="/" aria-label="Back to Dashboard" title="Back to Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10 7 5 12l5 5"></path>
            <path d="M5 12h9a5 5 0 0 0 0-10h-2"></path>
          </svg>
        </a>
        <button id="history-back-btn" class="history-nav-btn" type="button" aria-label="Previous reviewed page" title="Previous reviewed page" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>
        <button id="history-forth-btn" class="history-nav-btn" type="button" aria-label="Next page for review" title="Next page for review" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m9 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>
      <section class="header">
        <div class="header-title-row">
          <h1>Layout review</h1>
          <div class="meta-strip">
            <div id="page-meta" class="subline"></div>
            <span id="review-state-badge" class="review-state-badge" hidden></span>
          </div>
        </div>
        <div class="actions">
          <div class="zoom-control">
            <div class="zoom-combo">
              <input id="zoom-percent-input" class="zoom-percent-input" type="number" min="1" max="400" step="1" value="100" aria-label="Zoom percent" />
              <button id="zoom-trigger" class="zoom-caret-btn" type="button" aria-label="Open zoom presets" aria-haspopup="true" aria-expanded="false">
                <span class="zoom-caret">▾</span>
              </button>
            </div>
            <div id="zoom-menu" class="zoom-menu" hidden>
              <button class="zoom-option" type="button" data-zoom-mode="fit-page">Fit page</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-width">Fit width</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-height">Fit height</button>
              <button class="zoom-option" type="button" data-zoom-mode="automatic">Automatic</button>
              <div class="zoom-separator"></div>
            </div>
          </div>
          <button id="magnifier-toggle-btn" class="magnifier-toggle-btn" type="button" aria-label="Toggle magnifier" aria-pressed="false" title="Magnifier (M)">
            <svg class="magnifier-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m20 20-4.2-4.2"></path>
            </svg>
          </button>
          <div class="order-controls">
            <select id="layout-order-mode" class="order-mode-select" aria-label="Reading order mode">
              <option value="auto">Auto</option>
              <option value="single">Single</option>
              <option value="multi-column">Multi-column</option>
              <option value="two-page">Two-page</option>
            </select>
          </div>
          <button id="detect-btn" type="button">Detect</button>
          <button id="review-btn" type="button">Mark reviewed</button>
        </div>
      </section>

      <section class="grid">
        <article class="panel image-panel">
          <div id="image-viewport" class="image-viewport">
            <div id="image-wrap" class="image-wrap">
              <img id="page-image" alt="Page for layout review" />
              <div id="overlay"></div>
              <div id="draw-layer" class="draw-layer" hidden>
                <div id="draw-preview-box" class="draw-preview-box" hidden></div>
              </div>
            </div>
          </div>
        </article>

        <article class="panel layouts-panel">
          <div class="layouts-header">
            <h2>Layouts</h2>
            <div class="layouts-header-tools">
              <button id="add-btn" class="secondary layouts-add-btn" type="button" aria-label="Add box" title="Add box">
                <svg class="layouts-add-btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5v14"></path>
                  <path d="M5 12h14"></path>
                </svg>
              </button>
            </div>
          </div>
          <table>
              <thead>
                <tr>
                  <th class="layout-order-col" aria-label="Order"></th>
                  <th class="layout-class-col">Class</th>
                  <th class="layout-actions-col" aria-label="Actions"></th>
                </tr>
              </thead>
            <tbody id="layouts-body"></tbody>
          </table>
        </article>
      </section>
    </main>

    <div id="detect-modal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detect-modal-title">
        <h2 id="detect-modal-title">Detect</h2>
        <p class="modal-hint">Set Ultralytics inference parameters for DocLayNet detection.</p>
        <p class="modal-doc-links">
          Docs:
          <a href="https://docs.ultralytics.com/modes/predict/#inference-arguments" target="_blank" rel="noreferrer noopener">Predict inference arguments</a>
          |
          <a href="https://docs.ultralytics.com/usage/cfg/#predict-settings" target="_blank" rel="noreferrer noopener">Predict settings reference</a>
        </p>
        <div class="modal-field modal-presets-field">
          <label for="detect-modal-top-config">Presets</label>
          <select id="detect-modal-top-config">
            <option value="">No benchmark configs yet</option>
          </select>
        </div>
        <div class="modal-divider" aria-hidden="true"></div>
        <div class="modal-grid">
          <div class="modal-field">
            <div class="modal-field-label-row">
              <label for="detect-modal-model">Model checkpoint</label>
              <button class="field-help-btn" type="button" data-help-key="model" aria-label="Explain model checkpoint">i</button>
            </div>
            <select id="detect-modal-model">
              <option value="yolo26m-doclaynet.pt">yolo26m-doclaynet.pt</option>
            </select>
          </div>
          <div class="modal-field">
            <div class="modal-field-label-row">
              <label for="detect-modal-conf">Confidence min:0 max:1 default:0.2</label>
              <button class="field-help-btn" type="button" data-help-key="conf" aria-label="Explain confidence threshold">i</button>
            </div>
            <input id="detect-modal-conf" type="number" min="0" max="1" step="0.01" value="0.25" />
          </div>
          <div class="modal-field">
            <div class="modal-field-label-row">
              <label for="detect-modal-iou">IoU min:0 max:1 default:0.45</label>
              <button class="field-help-btn" type="button" data-help-key="iou" aria-label="Explain IoU threshold">i</button>
            </div>
            <input id="detect-modal-iou" type="number" min="0" max="1" step="0.01" value="0.45" />
          </div>
          <div class="modal-field">
            <div class="modal-field-label-row">
              <label for="detect-modal-imgsz">Image size min:32 max:4096 default:1024</label>
              <button class="field-help-btn" type="button" data-help-key="imgsz" aria-label="Explain image size">i</button>
            </div>
            <input id="detect-modal-imgsz" type="number" min="32" max="4096" step="32" value="1024" />
          </div>
          <div class="modal-field">
            <div class="modal-field-label-row">
              <label for="detect-modal-max-det">Max detections min:1 max:3000 default:300</label>
              <button class="field-help-btn" type="button" data-help-key="max_det" aria-label="Explain max detections">i</button>
            </div>
            <input id="detect-modal-max-det" type="number" min="1" max="3000" step="1" value="300" />
          </div>
          <div class="modal-field">
            <label for="detect-modal-replace-existing">
              <input id="detect-modal-replace-existing" type="checkbox" checked />
              Replace existing layouts
            </label>
          </div>
          <div class="modal-field">
            <div class="modal-field-checkbox-row">
              <label for="detect-modal-agnostic-nms">
                <input id="detect-modal-agnostic-nms" type="checkbox" />
                Agnostic NMS
              </label>
              <button class="field-help-btn" type="button" data-help-key="agnostic_nms" aria-label="Explain agnostic NMS">i</button>
            </div>
          </div>
        </div>
        <div id="detect-modal-help-cloud" class="field-help-cloud" role="tooltip" hidden></div>
        <div class="modal-actions">
          <button id="detect-modal-cancel-btn" class="secondary" type="button">Cancel</button>
          <button id="detect-modal-run-btn" type="button">Run detection</button>
        </div>
      </div>
    </div>

    <script type="module" src="/static/js/layout_review_page.mjs"></script>
  </body>
</html>
