<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Review</title>
    <style>
      :root {
        --bg: #f3f1eb;
        --surface: #fffdf7;
        --ink: #1e1f1c;
        --muted: #63635f;
        --accent: #0b7a75;
        --danger: #a52222;
        --border: #e0dccf;
        --actions-col-size: 7ch;
        --class-col-size: 16ch;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 100% 0, #d6ebe7 0, transparent 30%),
          radial-gradient(circle at 0 100%, #f7e3cf 0, transparent 32%),
          var(--bg);
      }

      main {
        position: relative;
        width: 100%;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .nav-strip {
        position: absolute;
        top: 24px;
        left: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .back-nav,
      .history-nav-btn {
        width: 44px;
        height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        font-size: 24px;
        line-height: 1;
        box-shadow: 0 8px 20px rgba(31, 35, 41, 0.08);
      }

      .back-nav:hover,
      .history-nav-btn:hover:not(:disabled) {
        background: #f5f1e6;
      }

      .history-nav-btn {
        cursor: pointer;
      }

      .history-nav-btn:disabled {
        opacity: 0.42;
        cursor: default;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-left: 172px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .subline {
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .zoom-control {
        position: relative;
      }

      .zoom-combo {
        display: inline-flex;
        position: relative;
        height: 38px;
        border: 1px solid #9aa99f;
        border-radius: 10px;
        overflow: hidden;
        background: var(--surface);
      }

      .zoom-percent-input {
        width: 58px;
        height: 100%;
        border: 0;
        padding: 0 8px;
        text-align: right;
        background: transparent;
        color: var(--ink);
        font-weight: 600;
      }

      .zoom-percent-input:focus {
        outline: none;
      }

      .zoom-caret-btn {
        width: 30px;
        height: 100%;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--border);
        border-radius: 0;
        background: #ece8df;
        color: var(--ink);
        font-size: 13px;
        line-height: 1;
        align-items: stretch;
      }

      .zoom-caret-btn:hover {
        background: #e3ddd1;
      }

      .zoom-caret {
        opacity: 0.75;
      }

      .zoom-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 172px;
        padding: 8px 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 14px 32px rgba(31, 35, 41, 0.14);
        z-index: 40;
      }

      .zoom-menu[hidden] {
        display: none;
      }

      .zoom-option {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: inherit;
        padding: 6px 12px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
      }

      .zoom-option:hover {
        background: #f0ece1;
      }

      .zoom-option.active::after {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }

      .zoom-separator {
        height: 1px;
        margin: 6px 0;
        background: var(--border);
      }

      button,
      a.button-link {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }

      button.secondary {
        background: var(--accent);
        color: #fff;
      }

      a.button-link.secondary {
        background: var(--accent);
        color: #fff;
      }

      button.danger {
        border-color: var(--danger);
        background: var(--danger);
      }

      .row-actions {
        display: inline-flex;
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
        width: 100%;
      }

      .icon-btn {
        width: 100%;
        min-width: 0;
        height: var(--actions-col-size);
        padding: 0;
        line-height: 1;
        font-size: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) fit-content(100%);
        grid-template-rows: minmax(0, 1fr);
        gap: 16px;
        align-items: stretch;
        flex: 1 1 auto;
        min-height: 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .image-panel {
        padding: 0;
        overflow: hidden;
        min-height: 0;
        display: flex;
      }

      .layouts-panel {
        width: fit-content;
        max-width: 100%;
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 32px);
        overflow: auto;
      }

      .layouts-panel table {
        width: auto;
      }

      .layouts-panel th,
      .layouts-panel td {
        white-space: nowrap;
      }

      .layout-class-select {
        width: 100%;
      }

      .layout-class-col {
        width: var(--class-col-size);
        min-width: var(--class-col-size);
      }

      .layout-order-col {
        width: 5ch;
      }

      .layout-actions-col {
        width: var(--actions-col-size);
        min-width: var(--actions-col-size);
      }

      .layout-order-input {
        width: 100%;
        min-width: 0;
        padding: 4px;
        text-align: right;
      }

      .layout-bbox-cell {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .bbox-field {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 12px;
        color: var(--muted);
      }

      .bbox-label {
        min-width: 18px;
      }

      .layout-bbox-input {
        width: 76px;
      }

      .image-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        max-height: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: auto;
        background: #f7f5ef;
      }

      .image-wrap {
        position: relative;
        width: max-content;
        margin: 0 auto;
      }

      #page-image {
        display: block;
        width: auto;
        height: auto;
        max-width: none;
      }

      #overlay {
        position: absolute;
        inset: 0;
      }

      .box {
        position: absolute;
        border: 1px solid #0b7a75;
        background: rgba(11, 122, 117, 0.12);
        border-radius: 4px;
        cursor: default;
        touch-action: none;
      }

      .box-label {
        position: absolute;
        top: -20px;
        left: 0;
        font-size: 12px;
        background: rgba(255, 253, 247, 0.92);
        color: #1e1f1c;
        border: 1px solid #cfc8b7;
        border-radius: 6px;
        padding: 2px 6px;
        white-space: nowrap;
        pointer-events: none;
      }

      .box-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        border: 1px solid rgba(20, 25, 25, 0.55);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 2px;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.9);
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .box-handle[data-handle="nw"] {
        top: -6px;
        left: -6px;
        cursor: nwse-resize;
      }

      .box-handle[data-handle="n"] {
        top: -6px;
        left: calc(50% - 5px);
        cursor: ns-resize;
      }

      .box-handle[data-handle="ne"] {
        top: -6px;
        right: -6px;
        cursor: nesw-resize;
      }

      .box-handle[data-handle="e"] {
        top: calc(50% - 5px);
        right: -6px;
        cursor: ew-resize;
      }

      .box-handle[data-handle="se"] {
        bottom: -6px;
        right: -6px;
        cursor: nwse-resize;
      }

      .box-handle[data-handle="s"] {
        bottom: -6px;
        left: calc(50% - 5px);
        cursor: ns-resize;
      }

      .box-handle[data-handle="sw"] {
        bottom: -6px;
        left: -6px;
        cursor: nesw-resize;
      }

      .box-handle[data-handle="w"] {
        top: calc(50% - 5px);
        left: -6px;
        cursor: ew-resize;
      }

      .box.layout-selected {
        z-index: 2;
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(30, 31, 28, 0.38);
      }

      .box.layout-selected .box-label {
        font-weight: 700;
      }

      .box.layout-selected .box-handle {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      .box-handle.point-highlight {
        z-index: 3;
        opacity: 1;
        pointer-events: auto;
        transform: scale(1.35);
        border-color: rgba(30, 31, 28, 0.9);
        background: rgba(255, 253, 247, 0.98);
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.35);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        text-align: left;
        padding: 8px 6px;
        vertical-align: top;
      }

      th {
        font-size: 13px;
        color: var(--muted);
      }

      #layouts-body tr.layout-selected td {
        background: #eeeadd;
      }

      #layouts-body tr.layout-selected td:first-child {
        box-shadow: inset 3px 0 0 var(--accent);
      }

      input {
        width: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      select {
        width: 100%;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }

      .status-line {
        margin-top: 8px;
        color: var(--muted);
      }

      .error {
        color: var(--danger);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(18, 23, 25, 0.52);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 30;
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .modal-card {
        width: min(520px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      .modal-card h2 {
        margin: 0 0 8px;
      }

      .modal-hint {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .modal-doc-links {
        margin: -4px 0 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .modal-doc-links a {
        color: var(--accent);
        text-decoration: none;
      }

      .modal-doc-links a:hover {
        text-decoration: underline;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .modal-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .modal-field input[type="checkbox"] {
        width: auto;
      }

      .modal-actions {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .nav-strip {
          top: 16px;
          left: 16px;
          gap: 6px;
        }

        .back-nav,
        .history-nav-btn {
          width: 40px;
          height: 40px;
          font-size: 22px;
        }

        .header {
          padding-left: 136px;
        }

        .image-viewport {
          max-height: 68vh;
        }

        .modal-grid {
          grid-template-columns: 1fr;
        }

        .layouts-panel {
          position: static;
          max-height: none;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav-strip">
        <a class="back-nav" href="/" aria-label="Back to Dashboard" title="Back to Dashboard">↩</a>
        <button id="history-back-btn" class="history-nav-btn" type="button" aria-label="Previous reviewed page" title="Previous reviewed page" disabled>←</button>
        <button id="history-forth-btn" class="history-nav-btn" type="button" aria-label="Next page for review" title="Next page for review" disabled>→</button>
      </div>
      <section class="header">
        <div>
          <h1>Layout Review</h1>
          <div id="page-meta" class="subline"></div>
        </div>
        <div class="actions">
          <div class="zoom-control">
            <div class="zoom-combo">
              <input id="zoom-percent-input" class="zoom-percent-input" type="number" min="1" max="400" step="1" value="100" aria-label="Zoom percent" />
              <button id="zoom-trigger" class="zoom-caret-btn" type="button" aria-label="Open zoom presets" aria-haspopup="true" aria-expanded="false">
                <span class="zoom-caret">▾</span>
              </button>
            </div>
            <div id="zoom-menu" class="zoom-menu" hidden>
              <button class="zoom-option" type="button" data-zoom-mode="fit-page">Fit Page</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-width">Fit Width</button>
              <button class="zoom-option" type="button" data-zoom-mode="automatic">Automatic</button>
              <div class="zoom-separator"></div>
              <button class="zoom-option" type="button" data-zoom-percent="50">50%</button>
              <button class="zoom-option" type="button" data-zoom-percent="70">70%</button>
              <button class="zoom-option" type="button" data-zoom-percent="85">85%</button>
              <button class="zoom-option" type="button" data-zoom-percent="100">100%</button>
              <button class="zoom-option" type="button" data-zoom-percent="125">125%</button>
              <button class="zoom-option" type="button" data-zoom-percent="150">150%</button>
              <button class="zoom-option" type="button" data-zoom-percent="175">175%</button>
              <button class="zoom-option" type="button" data-zoom-percent="200">200%</button>
              <button class="zoom-option" type="button" data-zoom-percent="300">300%</button>
              <button class="zoom-option" type="button" data-zoom-percent="400">400%</button>
            </div>
          </div>
          <button id="detect-btn" type="button">Redetect Layouts</button>
          <button id="add-btn" class="secondary" type="button">Add Box</button>
          <button id="review-btn" type="button">Mark Reviewed</button>
        </div>
      </section>

      <section class="grid">
        <article class="panel image-panel">
          <div id="image-viewport" class="image-viewport">
            <div id="image-wrap" class="image-wrap">
              <img id="page-image" alt="Page for layout review" />
              <div id="overlay"></div>
            </div>
          </div>
        </article>

        <article class="panel layouts-panel">
          <h2>Layouts</h2>
          <table>
            <thead>
                <tr>
                  <th class="layout-class-col">Class</th>
                  <th class="layout-order-col">Order</th>
                  <th>BBox</th>
                  <th class="layout-actions-col">Actions</th>
                </tr>
              </thead>
            <tbody id="layouts-body"></tbody>
          </table>
        </article>
      </section>
    </main>

    <div id="detect-modal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detect-modal-title">
        <h2 id="detect-modal-title">Redetect Layouts</h2>
        <p class="modal-hint">Set Ultralytics inference parameters for DocLayNet detection.</p>
        <p class="modal-doc-links">
          Docs:
          <a href="https://docs.ultralytics.com/modes/predict/#inference-arguments" target="_blank" rel="noreferrer noopener">Predict Inference Arguments</a>
          |
          <a href="https://docs.ultralytics.com/usage/cfg/#predict-settings" target="_blank" rel="noreferrer noopener">Predict Settings Reference</a>
        </p>
        <div class="modal-grid">
          <div class="modal-field">
            <label for="detect-modal-conf">Confidence (`conf` 0..1)</label>
            <input id="detect-modal-conf" type="number" min="0" max="1" step="0.01" value="0.25" />
          </div>
          <div class="modal-field">
            <label for="detect-modal-iou">IoU (`iou` 0..1)</label>
            <input id="detect-modal-iou" type="number" min="0" max="1" step="0.01" value="0.45" />
          </div>
          <div class="modal-field">
            <label for="detect-modal-imgsz">Image Size (`imgsz`)</label>
            <input id="detect-modal-imgsz" type="number" min="32" step="32" value="1024" />
          </div>
          <div class="modal-field">
            <label for="detect-modal-max-det">Max Detections (`max_det`)</label>
            <input id="detect-modal-max-det" type="number" min="1" step="1" value="300" />
          </div>
          <div class="modal-field">
            <label for="detect-modal-replace-existing">
              <input id="detect-modal-replace-existing" type="checkbox" checked />
              Replace existing layouts
            </label>
          </div>
          <div class="modal-field">
            <label for="detect-modal-agnostic-nms">
              <input id="detect-modal-agnostic-nms" type="checkbox" />
              Agnostic NMS (`agnostic_nms`)
            </label>
          </div>
        </div>
        <div class="modal-actions">
          <button id="detect-modal-cancel-btn" class="secondary" type="button">Cancel</button>
          <button id="detect-modal-run-btn" type="button">Run Detection</button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        clampZoomPercent,
        compactReadingOrdersAfterDeletion,
        computeViewportScrollTargetForLayoutId,
        computeZoomScale,
        normalizeReviewHistory,
        nextLayoutReviewUrl,
        pointHandleForCoordinateKey,
        previousHistoryPageId,
        updateReviewHistoryOnVisit,
      } from "/static/js/layout_review_utils.mjs";

      const params = new URLSearchParams(window.location.search);
      const pageId = Number(params.get("page_id"));
      const STORAGE_KEYS = {
        layoutDraftPrefix: "layout.draft.page",
        zoomMode: "layout.zoom.mode",
        zoomPercent: "layout.zoom.percent",
        reviewNavHistory: "layout.review_nav.history",
        reviewNavIndex: "layout.review_nav.index",
      };

      function readStorage(key) {
        try {
          return window.localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch {
          // Ignore storage errors (private mode / quota / disabled storage).
        }
      }

      function removeStorage(key) {
        try {
          window.localStorage.removeItem(key);
        } catch {
          // Ignore storage errors (private mode / quota / disabled storage).
        }
      }

      const pageMeta = document.getElementById("page-meta");
      const imageViewport = document.getElementById("image-viewport");
      const imageWrap = document.getElementById("image-wrap");
      const pageImage = document.getElementById("page-image");
      const overlay = document.getElementById("overlay");
      const statusLine = document.getElementById("status-line");
      const layoutsBody = document.getElementById("layouts-body");
      const zoomTrigger = document.getElementById("zoom-trigger");
      const zoomMenu = document.getElementById("zoom-menu");
      const zoomOptions = Array.from(document.querySelectorAll(".zoom-option"));
      const zoomPercentInput = document.getElementById("zoom-percent-input");

      const detectBtn = document.getElementById("detect-btn");
      const addBtn = document.getElementById("add-btn");
      const reviewBtn = document.getElementById("review-btn");
      const historyBackBtn = document.getElementById("history-back-btn");
      const historyForthBtn = document.getElementById("history-forth-btn");
      const detectModal = document.getElementById("detect-modal");
      const detectModalRunBtn = document.getElementById("detect-modal-run-btn");
      const detectModalCancelBtn = document.getElementById("detect-modal-cancel-btn");
      const detectModalConfInput = document.getElementById("detect-modal-conf");
      const detectModalIouInput = document.getElementById("detect-modal-iou");
      const detectModalImgszInput = document.getElementById("detect-modal-imgsz");
      const detectModalMaxDetInput = document.getElementById("detect-modal-max-det");
      const detectModalReplaceExistingInput = document.getElementById("detect-modal-replace-existing");
      const detectModalAgnosticNmsInput = document.getElementById("detect-modal-agnostic-nms");

      const state = {
        page: null,
        layouts: [],
        serverLayoutsById: {},
        localEditsById: {},
        deletedLayoutIds: new Set(),
        selectedLayoutId: null,
        activePointHighlight: null,
        zoomMode: "automatic",
        zoomPercent: 100,
        zoomAppliedPercent: 100,
        reviewHistory: [],
        reviewHistoryIndex: -1,
        nextReviewPageId: null,
      };

      function applyStoredZoomSettings() {
        state.zoomMode = "automatic";
        const storedPercent = readStorage(STORAGE_KEYS.zoomPercent);
        if (storedPercent !== null) {
          state.zoomPercent = clampZoomPercent(storedPercent);
        }
        state.zoomAppliedPercent = 100;
        setZoomInputFromApplied();
        updateZoomMenuSelection();
      }

      function closeZoomMenu() {
        zoomMenu.hidden = true;
        zoomTrigger.setAttribute("aria-expanded", "false");
      }

      function openZoomMenu() {
        zoomMenu.hidden = false;
        zoomTrigger.setAttribute("aria-expanded", "true");
      }

      function updateZoomMenuSelection() {
        for (const option of zoomOptions) {
          const optionMode = option.dataset.zoomMode || "";
          const optionPercent = option.dataset.zoomPercent || "";
          const modeMatch = optionMode !== "" && optionMode === state.zoomMode;
          const percentMatch =
            optionPercent !== "" &&
            state.zoomMode === "custom" &&
            Number(optionPercent) === Math.round(state.zoomPercent);
          option.classList.toggle("active", modeMatch || percentMatch);
        }
      }

      function setZoomInputFromApplied() {
        zoomPercentInput.value = String(Math.round(state.zoomAppliedPercent));
      }

      function centerImageInViewport() {
        const viewportWidth = imageViewport.clientWidth;
        const viewportHeight = imageViewport.clientHeight;
        const contentWidth = imageWrap.offsetWidth;
        const contentHeight = imageWrap.offsetHeight;
        if (!viewportWidth || !viewportHeight || !contentWidth || !contentHeight) {
          return;
        }
        imageViewport.scrollLeft = Math.max(0, Math.round((contentWidth - viewportWidth) / 2));
        imageViewport.scrollTop = Math.max(0, Math.round((contentHeight - viewportHeight) / 2));
      }

      function applyZoom() {
        const naturalWidth = pageImage.naturalWidth;
        const naturalHeight = pageImage.naturalHeight;
        if (!naturalWidth || !naturalHeight) {
          return;
        }

        const scale = computeZoomScale({
          mode: state.zoomMode,
          zoomPercent: state.zoomPercent,
          naturalWidth,
          naturalHeight,
          viewportWidth: Math.max(1, imageViewport.clientWidth),
          viewportHeight: Math.max(1, imageViewport.clientHeight),
        });
        if (!scale || !Number.isFinite(scale) || scale <= 0) {
          return;
        }

        const displayWidth = Math.max(1, Math.round(naturalWidth * scale));
        const displayHeight = Math.max(1, Math.round(naturalHeight * scale));
        pageImage.style.width = `${displayWidth}px`;
        pageImage.style.height = `${displayHeight}px`;
        imageWrap.style.width = `${displayWidth}px`;
        imageWrap.style.height = `${displayHeight}px`;

        state.zoomAppliedPercent = Math.round(scale * 1000) / 10;
        setZoomInputFromApplied();
        updateZoomMenuSelection();
        requestAnimationFrame(() => {
          centerImageInViewport();
        });
      }

      function persistZoomSettings() {
        writeStorage(STORAGE_KEYS.zoomMode, state.zoomMode);
        writeStorage(STORAGE_KEYS.zoomPercent, String(Math.round(clampZoomPercent(state.zoomPercent))));
      }

      function setZoomMode(mode) {
        if (!["fit-page", "fit-width", "automatic"].includes(mode)) {
          return;
        }
        state.zoomMode = mode;
        applyZoom();
        persistZoomSettings();
      }

      function setCustomZoomPercent(percent) {
        state.zoomMode = "custom";
        state.zoomPercent = clampZoomPercent(percent);
        applyZoom();
        persistZoomSettings();
      }

      function applyCustomZoomFromInput() {
        const raw = Number(zoomPercentInput.value);
        if (!Number.isFinite(raw)) {
          setZoomInputFromApplied();
          return;
        }
        setCustomZoomPercent(raw);
      }

      function persistReviewHistory() {
        writeStorage(STORAGE_KEYS.reviewNavHistory, JSON.stringify(state.reviewHistory));
        writeStorage(STORAGE_KEYS.reviewNavIndex, String(state.reviewHistoryIndex));
      }

      function updateHistoryNavButtons() {
        const backTarget = previousHistoryPageId(state.reviewHistory, state.reviewHistoryIndex);
        historyBackBtn.disabled = backTarget === null;
        historyBackBtn.title =
          backTarget === null ? "No previously reviewed page in this session history." : "Previous reviewed page";

        const hasForth = Number.isInteger(state.nextReviewPageId) && state.nextReviewPageId > 0;
        historyForthBtn.disabled = !hasForth;
        historyForthBtn.title = hasForth
          ? "Open next page waiting for layout review."
          : "No next page waiting for layout review.";
      }

      function loadReviewHistory() {
        const rawHistory = readStorage(STORAGE_KEYS.reviewNavHistory);
        const rawIndex = readStorage(STORAGE_KEYS.reviewNavIndex);
        let parsedHistory = [];
        if (rawHistory) {
          try {
            parsedHistory = JSON.parse(rawHistory);
          } catch {
            parsedHistory = [];
          }
        }
        const normalized = normalizeReviewHistory(parsedHistory, rawIndex);
        state.reviewHistory = normalized.history;
        state.reviewHistoryIndex = normalized.index;
      }

      function registerCurrentPageInHistory() {
        const updated = updateReviewHistoryOnVisit(
          state.reviewHistory,
          state.reviewHistoryIndex,
          pageId,
        );
        state.reviewHistory = updated.history;
        state.reviewHistoryIndex = updated.index;
        persistReviewHistory();
        updateHistoryNavButtons();
      }

      function scrollImageViewportToLayout(layoutId) {
        const target = computeViewportScrollTargetForLayoutId({
          layoutId,
          layouts: state.layouts,
          contentWidth: imageWrap.offsetWidth,
          contentHeight: imageWrap.offsetHeight,
          viewportWidth: imageViewport.clientWidth,
          viewportHeight: imageViewport.clientHeight,
        });
        if (!target) {
          return;
        }
        imageViewport.scrollLeft = target.left;
        imageViewport.scrollTop = target.top;
      }

      function draftStorageKey() {
        return `${STORAGE_KEYS.layoutDraftPrefix}:${pageId}`;
      }

      function toDraftShape(layout) {
        return {
          class_name: normalizeClassName(layout.class_name) || "text",
          reading_order: layout.reading_order === null ? null : Number(layout.reading_order),
          bbox: {
            x1: roundTo4(layout.bbox.x1),
            y1: roundTo4(layout.bbox.y1),
            x2: roundTo4(layout.bbox.x2),
            y2: roundTo4(layout.bbox.y2),
          },
        };
      }

      function sameDraft(a, b) {
        return (
          a.class_name === b.class_name &&
          a.reading_order === b.reading_order &&
          a.bbox.x1 === b.bbox.x1 &&
          a.bbox.y1 === b.bbox.y1 &&
          a.bbox.x2 === b.bbox.x2 &&
          a.bbox.y2 === b.bbox.y2
        );
      }

      function parseStoredDraft(rawDraft) {
        if (!rawDraft || typeof rawDraft !== "object") {
          return null;
        }

        const className = normalizeClassName(rawDraft.class_name);
        if (!className) {
          return null;
        }

        const readingOrderRaw = rawDraft.reading_order;
        let readingOrder = null;
        if (readingOrderRaw !== null) {
          const parsed = Number(readingOrderRaw);
          if (!Number.isInteger(parsed) || parsed < 1) {
            return null;
          }
          readingOrder = parsed;
        }

        const bbox = rawDraft.bbox;
        if (!bbox || typeof bbox !== "object") {
          return null;
        }

        const x1 = roundTo4(bbox.x1);
        const y1 = roundTo4(bbox.y1);
        const x2 = roundTo4(bbox.x2);
        const y2 = roundTo4(bbox.y2);
        if ([x1, y1, x2, y2].some((value) => Number.isNaN(value) || value < 0 || value > 1)) {
          return null;
        }

        return {
          class_name: className,
          reading_order: readingOrder,
          bbox: { x1, y1, x2, y2 },
        };
      }

      function loadLayoutDraftState() {
        state.localEditsById = {};
        state.deletedLayoutIds = new Set();

        const raw = readStorage(draftStorageKey());
        if (!raw) {
          return;
        }

        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch {
          return;
        }
        if (!parsed || typeof parsed !== "object") {
          return;
        }

        const edits = parsed.edits;
        if (edits && typeof edits === "object") {
          for (const [key, value] of Object.entries(edits)) {
            const id = Number(key);
            if (!Number.isInteger(id) || id <= 0) {
              continue;
            }
            const draft = parseStoredDraft(value);
            if (!draft) {
              continue;
            }
            state.localEditsById[String(id)] = draft;
          }
        }

        if (Array.isArray(parsed.deleted_ids)) {
          for (const rawId of parsed.deleted_ids) {
            const id = Number(rawId);
            if (Number.isInteger(id) && id > 0) {
              state.deletedLayoutIds.add(id);
              delete state.localEditsById[String(id)];
            }
          }
        }
      }

      function persistLayoutDraftState() {
        const payload = {
          edits: state.localEditsById,
          deleted_ids: Array.from(state.deletedLayoutIds).sort((a, b) => a - b),
        };
        writeStorage(draftStorageKey(), JSON.stringify(payload));
      }

      function clearLayoutDraftState() {
        state.localEditsById = {};
        state.deletedLayoutIds = new Set();
        removeStorage(draftStorageKey());
      }

      const CLASS_COLORS = {
        title: "#8f4b63",
        section_header: "#355fa8",
        text: "#4f5d69",
        list_item: "#2f6f5f",
        table: "#6f7d2f",
        picture: "#8a6831",
        caption: "#496f98",
        footnote: "#7a6030",
        formula: "#7b5a95",
        page_header: "#3f6e69",
        page_footer: "#8b5949",
      };

      const KNOWN_LAYOUT_CLASSES = [
        "title",
        "section_header",
        "text",
        "list_item",
        "table",
        "picture",
        "caption",
        "footnote",
        "formula",
        "page_header",
        "page_footer",
      ];

      const FALLBACK_COLORS = ["#4e6f8f", "#7c5f90", "#3f7b69", "#8d6a3b", "#82605b", "#537987", "#6e6b3f"];

      function hashString(value) {
        let hash = 0;
        for (let i = 0; i < value.length; i += 1) {
          hash = (hash << 5) - hash + value.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function colorForClass(className) {
        const normalized = String(className || "")
          .trim()
          .toLowerCase()
          .replace(/[-/\s]+/g, "_");
        if (CLASS_COLORS[normalized]) {
          return CLASS_COLORS[normalized];
        }
        return FALLBACK_COLORS[hashString(normalized) % FALLBACK_COLORS.length];
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const r = Number.parseInt(clean.slice(0, 2), 16);
        const g = Number.parseInt(clean.slice(2, 4), 16);
        const b = Number.parseInt(clean.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function setStatus(message, { isError = false } = {}) {
        if (!statusLine) {
          if (isError) {
            console.error(message);
          }
          return;
        }
        statusLine.textContent = message;
        statusLine.classList.toggle("error", isError);
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = payload && payload.detail ? payload.detail : `Request failed: ${response.status}`;
          throw new Error(detail);
        }
        return payload;
      }

      function toFixed(value) {
        return Number(value).toFixed(4);
      }

      function roundTo4(value) {
        return Math.round(Number(value) * 10000) / 10000;
      }

      function boxStyle(layout) {
        const { x1, y1, x2, y2 } = layout.bbox;
        return {
          left: `${x1 * 100}%`,
          top: `${y1 * 100}%`,
          width: `${(x2 - x1) * 100}%`,
          height: `${(y2 - y1) * 100}%`,
        };
      }

      function applyBoxElementStyle(boxElement, bbox, color) {
        const style = boxStyle({ bbox });
        boxElement.style.left = style.left;
        boxElement.style.top = style.top;
        boxElement.style.width = style.width;
        boxElement.style.height = style.height;
        boxElement.style.borderColor = color;
        boxElement.style.background = hexToRgba(color, 0.16);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function readingOrderSortValue(layout) {
        const value = Number(layout.reading_order);
        if (Number.isInteger(value) && value >= 1) {
          return value;
        }
        return Number.MAX_SAFE_INTEGER;
      }

      function sortLayoutsInPlace() {
        state.layouts.sort((a, b) => {
          const orderCmp = readingOrderSortValue(a) - readingOrderSortValue(b);
          if (orderCmp !== 0) {
            return orderCmp;
          }
          return Number(a.id) - Number(b.id);
        });
      }

      function findLayoutById(layoutId) {
        return state.layouts.find((row) => Number(row.id) === Number(layoutId)) || null;
      }

      function clearSelectedLayoutIfMissing() {
        if (state.selectedLayoutId === null) {
          return;
        }
        const exists = state.layouts.some((row) => Number(row.id) === Number(state.selectedLayoutId));
        if (!exists) {
          state.selectedLayoutId = null;
        }
      }

      function applySelectedLayoutStyles({ scrollRowIntoView = false } = {}) {
        clearSelectedLayoutIfMissing();
        const selectedId = Number(state.selectedLayoutId);

        for (const rowEl of layoutsBody.querySelectorAll("tr[data-layout-id]")) {
          const rowId = Number(rowEl.dataset.layoutId);
          rowEl.classList.toggle("layout-selected", rowId === selectedId);
        }
        for (const boxEl of overlay.querySelectorAll(".box[data-layout-id]")) {
          const boxId = Number(boxEl.dataset.layoutId);
          boxEl.classList.toggle("layout-selected", boxId === selectedId);
        }

        if (scrollRowIntoView) {
          const selectedRow = layoutsBody.querySelector(`tr[data-layout-id="${selectedId}"]`);
          selectedRow?.scrollIntoView({ block: "nearest" });
        }
      }

      function selectLayout(layoutId, { scrollRowIntoView = false, scrollImageToLayout = false } = {}) {
        const normalizedId = Number(layoutId);
        if (!Number.isInteger(normalizedId)) {
          return;
        }
        const exists = state.layouts.some((row) => Number(row.id) === normalizedId);
        if (!exists) {
          return;
        }
        state.selectedLayoutId = normalizedId;
        applySelectedLayoutStyles({ scrollRowIntoView });
        if (scrollImageToLayout) {
          scrollImageViewportToLayout(normalizedId);
        }
      }

      function clearActivePointHighlightIfMissing() {
        if (!state.activePointHighlight) {
          return;
        }
        const { layoutId } = state.activePointHighlight;
        const exists = state.layouts.some((row) => Number(row.id) === Number(layoutId));
        if (!exists) {
          state.activePointHighlight = null;
        }
      }

      function applyActivePointHighlightStyles() {
        clearActivePointHighlightIfMissing();
        const highlight = state.activePointHighlight;
        const selector = highlight
          ? `.box-handle[data-layout-id="${highlight.layoutId}"][data-handle="${highlight.handle}"]`
          : null;

        for (const handleEl of overlay.querySelectorAll(".box-handle")) {
          const isActive = Boolean(selector) && handleEl.matches(selector);
          handleEl.classList.toggle("point-highlight", isActive);
        }
      }

      function setActivePointHighlight(layoutId, handle) {
        const normalizedId = Number(layoutId);
        if (!Number.isInteger(normalizedId)) {
          return;
        }
        const exists = state.layouts.some((row) => Number(row.id) === normalizedId);
        if (!exists) {
          return;
        }
        if (handle !== "nw" && handle !== "se") {
          return;
        }
        state.activePointHighlight = { layoutId: normalizedId, handle };
        applyActivePointHighlightStyles();
      }

      function clearActivePointHighlight(layoutId, handle) {
        const current = state.activePointHighlight;
        if (!current) {
          return;
        }
        if (Number(current.layoutId) !== Number(layoutId) || current.handle !== handle) {
          return;
        }
        state.activePointHighlight = null;
        applyActivePointHighlightStyles();
      }

      function upsertDraftForLayout(layoutId, draft) {
        const layout = findLayoutById(layoutId);
        if (!layout) {
          return false;
        }

        layout.class_name = draft.class_name;
        layout.reading_order = draft.reading_order;
        layout.bbox = { ...draft.bbox };

        const serverLayout = state.serverLayoutsById[String(layoutId)];
        const serverBaseline = serverLayout ? toDraftShape(serverLayout) : toDraftShape(layout);
        if (sameDraft(draft, serverBaseline)) {
          delete state.localEditsById[String(layoutId)];
        } else {
          state.localEditsById[String(layoutId)] = draft;
        }
        state.deletedLayoutIds.delete(Number(layoutId));
        persistLayoutDraftState();
        return true;
      }

      function bboxWithMinSize(bbox, handle) {
        const minSize = 0.001;
        let { x1, y1, x2, y2 } = bbox;

        x1 = clamp(x1, 0, 1);
        x2 = clamp(x2, 0, 1);
        y1 = clamp(y1, 0, 1);
        y2 = clamp(y2, 0, 1);

        if (x2 - x1 < minSize) {
          if (handle.includes("w")) {
            x1 = x2 - minSize;
          } else {
            x2 = x1 + minSize;
          }
        }
        if (y2 - y1 < minSize) {
          if (handle.includes("n")) {
            y1 = y2 - minSize;
          } else {
            y2 = y1 + minSize;
          }
        }

        x1 = clamp(x1, 0, 1 - minSize);
        x2 = clamp(x2, minSize, 1);
        y1 = clamp(y1, 0, 1 - minSize);
        y2 = clamp(y2, minSize, 1);

        if (x2 - x1 < minSize) {
          x2 = clamp(x1 + minSize, minSize, 1);
        }
        if (y2 - y1 < minSize) {
          y2 = clamp(y1 + minSize, minSize, 1);
        }

        return {
          x1: roundTo4(x1),
          y1: roundTo4(y1),
          x2: roundTo4(x2),
          y2: roundTo4(y2),
        };
      }

      function resizeBBox(startBBox, deltaX, deltaY, handle) {
        const next = { ...startBBox };
        if (handle.includes("w")) next.x1 += deltaX;
        if (handle.includes("e")) next.x2 += deltaX;
        if (handle.includes("n")) next.y1 += deltaY;
        if (handle.includes("s")) next.y2 += deltaY;
        return bboxWithMinSize(next, handle);
      }

      function beginOverlayDrag(event, layoutId, handle, boxElement, color) {
        if (event.button !== 0) {
          return;
        }
        const layout = findLayoutById(layoutId);
        if (!layout) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        selectLayout(layoutId, { scrollRowIntoView: true });
        boxElement.setPointerCapture?.(event.pointerId);

        const rect = overlay.getBoundingClientRect();
        if (!rect.width || !rect.height) {
          return;
        }

        const startClientX = event.clientX;
        const startClientY = event.clientY;
        const startBBox = { ...layout.bbox };

        const onPointerMove = (moveEvent) => {
          const dx = (moveEvent.clientX - startClientX) / rect.width;
          const dy = (moveEvent.clientY - startClientY) / rect.height;

          const nextBBox = resizeBBox(startBBox, dx, dy, handle);
          layout.bbox = { ...nextBBox };
          applyBoxElementStyle(boxElement, nextBBox, color);
        };

        const finish = () => {
          window.removeEventListener("pointermove", onPointerMove);
          window.removeEventListener("pointerup", onPointerUp);
          window.removeEventListener("pointercancel", onPointerCancel);

          const latest = findLayoutById(layoutId);
          if (!latest) {
            return;
          }
          const draft = toDraftShape(latest);
          if (!upsertDraftForLayout(layoutId, draft)) {
            return;
          }
          renderLayouts();
          setStatus("Layout draft updated from canvas.");
        };

        const onPointerUp = () => {
          finish();
        };
        const onPointerCancel = () => {
          finish();
        };

        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerCancel);
      }

      function renderOverlay() {
        overlay.innerHTML = "";
        for (const layout of state.layouts) {
          const color = colorForClass(layout.class_name);
          const box = document.createElement("div");
          box.className = "box";
          box.dataset.layoutId = String(layout.id);
          applyBoxElementStyle(box, layout.bbox, color);
          box.addEventListener("pointerdown", (event) => {
            if (event.button !== 0) {
              return;
            }
            const target = event.target;
            if (target instanceof Element && target.closest(".box-handle")) {
              return;
            }
            selectLayout(layout.id, { scrollRowIntoView: true });
          });

          const label = document.createElement("div");
          label.className = "box-label";
          label.style.color = color;
          label.style.borderColor = hexToRgba(color, 0.62);
          label.textContent = `${layout.reading_order}. ${layout.class_name}`;
          box.appendChild(label);

          for (const handle of ["nw", "n", "ne", "e", "se", "s", "sw", "w"]) {
            const handleEl = document.createElement("div");
            handleEl.className = "box-handle";
            handleEl.dataset.handle = handle;
            handleEl.dataset.layoutId = String(layout.id);
            handleEl.addEventListener("pointerdown", (event) => {
              beginOverlayDrag(event, layout.id, handle, box, color);
            });
            box.appendChild(handleEl);
          }

          overlay.appendChild(box);
        }
        applySelectedLayoutStyles();
        applyActivePointHighlightStyles();
      }

      function formatClassLabel(className) {
        return String(className)
          .replace(/_/g, " ")
          .replace(/\b\w/g, (m) => m.toUpperCase());
      }

      function normalizeClassName(className) {
        return String(className || "")
          .trim()
          .toLowerCase()
          .replace(/[-/\s]+/g, "_");
      }

      function buildClassSelect(initialClass) {
        const select = document.createElement("select");
        const normalizedInitial = normalizeClassName(initialClass);
        const classes = [...KNOWN_LAYOUT_CLASSES];
        if (normalizedInitial && !classes.includes(normalizedInitial)) {
          classes.unshift(normalizedInitial);
        }

        for (const className of classes) {
          const option = document.createElement("option");
          option.value = className;
          option.textContent = formatClassLabel(className);
          select.appendChild(option);
        }

        select.value = normalizedInitial || "text";
        return select;
      }

      function applyClassColorToSelect(select, className) {
        const color = colorForClass(className);
        select.style.borderColor = hexToRgba(color, 0.55);
        select.style.color = color;
      }

      function layoutRow(layout) {
        const tr = document.createElement("tr");
        const layoutId = Number(layout.id);
        tr.dataset.layoutId = String(layoutId);
        tr.addEventListener("pointerdown", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        tr.addEventListener("focusin", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        const serverLayout = state.serverLayoutsById[String(layoutId)];
        const serverBaseline = serverLayout ? toDraftShape(serverLayout) : toDraftShape(layout);

        const classTd = document.createElement("td");
        classTd.className = "layout-class-col";
        const classInput = buildClassSelect(layout.class_name);
        classInput.classList.add("layout-class-select");
        applyClassColorToSelect(classInput, layout.class_name);
        classInput.addEventListener("focus", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        classInput.addEventListener("pointerdown", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        classTd.appendChild(classInput);
        tr.appendChild(classTd);

        const orderTd = document.createElement("td");
        orderTd.className = "layout-order-col";
        const orderInput = document.createElement("input");
        orderInput.type = "number";
        orderInput.min = "1";
        orderInput.step = "1";
        orderInput.className = "layout-order-input";
        orderInput.value = layout.reading_order === null ? "" : String(layout.reading_order);
        orderInput.addEventListener("focus", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        orderInput.addEventListener("pointerdown", () => {
          selectLayout(layoutId, { scrollImageToLayout: true });
        });
        orderTd.appendChild(orderInput);
        tr.appendChild(orderTd);

        const bboxTd = document.createElement("td");
        bboxTd.className = "layout-bbox-cell";
        const bboxSpec = [
          ["x1", "x1"],
          ["y1", "y1"],
          ["x2", "x2"],
          ["y2", "y2"],
        ];
        const bboxFields = bboxSpec.map(([key, labelText]) => {
          const input = document.createElement("input");
          input.type = "number";
          input.min = "0";
          input.max = "1";
          input.step = "0.001";
          input.className = "layout-bbox-input";
          input.value = toFixed(layout.bbox[key]);
          const field = document.createElement("label");
          field.className = "bbox-field";
          const label = document.createElement("span");
          label.className = "bbox-label";
          label.textContent = labelText;
          field.appendChild(label);
          field.appendChild(input);
          return [key, input, field];
        });
        for (const [, , field] of bboxFields) {
          bboxTd.appendChild(field);
        }
        tr.appendChild(bboxTd);

        for (const [key, input] of bboxFields) {
          const pointHandle = pointHandleForCoordinateKey(key);
          if (!pointHandle) {
            continue;
          }
          input.addEventListener("focus", () => {
            selectLayout(layoutId, { scrollRowIntoView: true, scrollImageToLayout: true });
            setActivePointHighlight(layoutId, pointHandle);
          });
          input.addEventListener("pointerdown", () => {
            selectLayout(layoutId, { scrollRowIntoView: true, scrollImageToLayout: true });
            setActivePointHighlight(layoutId, pointHandle);
          });
          input.addEventListener("blur", () => {
            clearActivePointHighlight(layoutId, pointHandle);
          });
        }

        function applyDraftToInputs(draft) {
          classInput.value = draft.class_name;
          applyClassColorToSelect(classInput, draft.class_name);
          orderInput.value = draft.reading_order === null ? "" : String(draft.reading_order);
          bboxFields[0][1].value = toFixed(draft.bbox.x1);
          bboxFields[1][1].value = toFixed(draft.bbox.y1);
          bboxFields[2][1].value = toFixed(draft.bbox.x2);
          bboxFields[3][1].value = toFixed(draft.bbox.y2);
        }

        function parseReadingOrder(rawValue) {
          const raw = String(rawValue).trim();
          if (raw === "") {
            return null;
          }
          const value = Number(raw);
          if (!Number.isInteger(value) || value < 1) {
            throw new Error("Reading order must be an integer >= 1.");
          }
          return value;
        }

        function parseBoundedNumber(rawValue) {
          const value = roundTo4(rawValue);
          if (Number.isNaN(value) || value < 0 || value > 1) {
            throw new Error("BBox values must be between 0 and 1.");
          }
          return value;
        }

        function payloadFromInputs() {
          const className = normalizeClassName(classInput.value) || "text";
          return {
            class_name: className,
            reading_order: parseReadingOrder(orderInput.value),
            bbox: {
              x1: parseBoundedNumber(bboxFields[0][1].value),
              y1: parseBoundedNumber(bboxFields[1][1].value),
              x2: parseBoundedNumber(bboxFields[2][1].value),
              y2: parseBoundedNumber(bboxFields[3][1].value),
            },
          };
        }

        function replaceLayoutInState(updatedLayout) {
          const idx = state.layouts.findIndex((row) => row.id === updatedLayout.id);
          if (idx >= 0) {
            state.layouts[idx] = updatedLayout;
            renderOverlay();
          }
        }

        function applyDraftToState(draft) {
          replaceLayoutInState({
            ...layout,
            id: layoutId,
            class_name: draft.class_name,
            reading_order: draft.reading_order,
            bbox: { ...draft.bbox },
          });
        }

        function saveLocalDraft() {
          let draft;
          try {
            draft = payloadFromInputs();
          } catch (error) {
            setStatus(`Draft not saved: ${error.message}`, { isError: true });
            return false;
          }

          applyDraftToState(draft);
          if (sameDraft(draft, serverBaseline)) {
            delete state.localEditsById[String(layoutId)];
            state.deletedLayoutIds.delete(layoutId);
            setStatus("Draft cleared (matches original).");
          } else {
            state.localEditsById[String(layoutId)] = draft;
            state.deletedLayoutIds.delete(layoutId);
            setStatus("Draft saved locally.");
          }
          persistLayoutDraftState();
          return true;
        }

        classInput.addEventListener("change", () => {
          applyClassColorToSelect(classInput, classInput.value);
          saveLocalDraft();
        });
        orderInput.addEventListener("change", () => {
          const previousOrder = Number.isInteger(Number(layout.reading_order))
            ? Number(layout.reading_order)
            : null;
          if (saveLocalDraft()) {
            const currentLayout = state.layouts.find((row) => Number(row.id) === layoutId);
            const nextOrder =
              currentLayout && Number.isInteger(Number(currentLayout.reading_order))
                ? Number(currentLayout.reading_order)
                : null;
            let swapped = false;

            if (previousOrder !== null && nextOrder !== null && previousOrder !== nextOrder) {
              const conflict = state.layouts.find(
                (row) => Number(row.id) !== layoutId && Number(row.reading_order) === nextOrder,
              );
              if (conflict) {
                const conflictId = Number(conflict.id);
                const conflictDraft = toDraftShape(conflict);
                conflictDraft.reading_order = previousOrder;

                conflict.class_name = conflictDraft.class_name;
                conflict.reading_order = conflictDraft.reading_order;
                conflict.bbox = { ...conflictDraft.bbox };

                const conflictServer = state.serverLayoutsById[String(conflictId)];
                const conflictBaseline = conflictServer ? toDraftShape(conflictServer) : conflictDraft;
                if (sameDraft(conflictDraft, conflictBaseline)) {
                  delete state.localEditsById[String(conflictId)];
                } else {
                  state.localEditsById[String(conflictId)] = conflictDraft;
                }
                state.deletedLayoutIds.delete(conflictId);
                persistLayoutDraftState();
                swapped = true;
              }
            }

            renderLayouts();
            if (swapped) {
              setStatus("Draft saved locally. Order swapped.");
            }
          }
        });
        for (const [, input] of bboxFields) {
          input.addEventListener("change", () => {
            const parsed = Number(input.value);
            if (!Number.isNaN(parsed)) {
              input.value = toFixed(roundTo4(parsed));
            }
            saveLocalDraft();
          });
        }

        const actionsTd = document.createElement("td");
        actionsTd.className = "layout-actions-col";
        const actionsWrap = document.createElement("div");
        actionsWrap.className = "row-actions";

        const restoreBtn = document.createElement("button");
        restoreBtn.className = "secondary icon-btn";
        restoreBtn.type = "button";
        restoreBtn.title = "Restore values";
        restoreBtn.setAttribute("aria-label", "Restore values");
        restoreBtn.textContent = "↺";
        restoreBtn.addEventListener("click", () => {
          applyDraftToInputs(serverBaseline);
          applyDraftToState(serverBaseline);
          delete state.localEditsById[String(layoutId)];
          state.deletedLayoutIds.delete(layoutId);
          persistLayoutDraftState();
          renderLayouts();
          setStatus("Layout values restored.");
        });
        actionsWrap.appendChild(restoreBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "danger icon-btn";
        deleteBtn.type = "button";
        deleteBtn.title = "Delete layout";
        deleteBtn.setAttribute("aria-label", "Delete layout");
        deleteBtn.textContent = "🗑";
        deleteBtn.addEventListener("click", () => {
          const removedLayout = state.layouts.find((row) => Number(row.id) === layoutId) || null;
          const removedOrder = removedLayout?.reading_order;

          state.deletedLayoutIds.add(layoutId);
          delete state.localEditsById[String(layoutId)];

          const remainingLayouts = state.layouts.filter((row) => Number(row.id) !== layoutId);
          const { layouts: compactedLayouts, shiftedIds } = compactReadingOrdersAfterDeletion(
            remainingLayouts,
            removedOrder,
          );
          state.layouts = compactedLayouts;

          for (const shiftedId of shiftedIds) {
            const shiftedLayout = state.layouts.find((row) => Number(row.id) === Number(shiftedId));
            if (!shiftedLayout) {
              continue;
            }
            const shiftedDraft = toDraftShape(shiftedLayout);
            const shiftedServer = state.serverLayoutsById[String(shiftedId)];
            const shiftedBaseline = shiftedServer ? toDraftShape(shiftedServer) : shiftedDraft;
            if (sameDraft(shiftedDraft, shiftedBaseline)) {
              delete state.localEditsById[String(shiftedId)];
            } else {
              state.localEditsById[String(shiftedId)] = shiftedDraft;
            }
            state.deletedLayoutIds.delete(Number(shiftedId));
          }

          persistLayoutDraftState();
          renderLayouts();
          setStatus("Layout marked for deletion. It will be deleted after review.");
        });
        actionsWrap.appendChild(deleteBtn);

        actionsTd.appendChild(actionsWrap);
        tr.appendChild(actionsTd);
        return tr;
      }

      function renderLayouts() {
        sortLayoutsInPlace();
        clearSelectedLayoutIfMissing();
        clearActivePointHighlightIfMissing();
        layoutsBody.innerHTML = "";
        for (const layout of state.layouts) {
          layoutsBody.appendChild(layoutRow(layout));
        }
        renderOverlay();
        applySelectedLayoutStyles();
      }

      async function loadPage() {
        const payload = await fetchJson(`/api/pages/${pageId}`);
        state.page = payload.page;
        pageMeta.textContent = `Page #${state.page.id} | ${state.page.rel_path}`;
        pageImage.src = payload.image_url;
      }

      async function loadLayouts() {
        const payload = await fetchJson(`/api/pages/${pageId}/layouts`);
        state.serverLayoutsById = {};
        for (const layout of payload.layouts) {
          state.serverLayoutsById[String(layout.id)] = layout;
        }

        const mergedLayouts = [];
        for (const layout of payload.layouts) {
          const layoutId = Number(layout.id);
          if (state.deletedLayoutIds.has(layoutId)) {
            continue;
          }

          const draft = state.localEditsById[String(layoutId)];
          if (!draft) {
            mergedLayouts.push(layout);
            continue;
          }
          mergedLayouts.push({
            ...layout,
            class_name: draft.class_name,
            reading_order: draft.reading_order,
            bbox: { ...draft.bbox },
          });
        }

        for (const key of Object.keys(state.localEditsById)) {
          if (!(key in state.serverLayoutsById)) {
            delete state.localEditsById[key];
          }
        }
        for (const layoutId of Array.from(state.deletedLayoutIds)) {
          if (!(String(layoutId) in state.serverLayoutsById)) {
            state.deletedLayoutIds.delete(layoutId);
          }
        }

        state.layouts = mergedLayouts;
        persistLayoutDraftState();
        renderLayouts();
      }

      async function refreshNextReviewButton() {
        try {
          const payload = await fetchJson(`/api/pages/${pageId}/layout-review-next`);
          const nextUrl = nextLayoutReviewUrl(payload);
          const candidate = nextUrl ? Number(payload.next_page_id) : null;
          state.nextReviewPageId =
            Number.isInteger(candidate) && candidate > 0 && candidate !== pageId ? candidate : null;
        } catch {
          state.nextReviewPageId = null;
        }
        updateHistoryNavButtons();
      }

      function openDetectModal() {
        detectModal.hidden = false;
      }

      function closeDetectModal() {
        detectModal.hidden = true;
      }

      function parseDetectModalPayload() {
        const confidence = Number(detectModalConfInput.value);
        const iou = Number(detectModalIouInput.value);
        const imageSize = Number(detectModalImgszInput.value);
        const maxDetections = Number(detectModalMaxDetInput.value);
        if (Number.isNaN(confidence) || confidence < 0 || confidence > 1) {
          throw new Error("Confidence (`conf`) must be between 0 and 1.");
        }
        if (Number.isNaN(iou) || iou < 0 || iou > 1) {
          throw new Error("IoU (`iou`) must be between 0 and 1.");
        }
        if (!Number.isInteger(imageSize) || imageSize < 32) {
          throw new Error("Image size (`imgsz`) must be an integer >= 32.");
        }
        if (!Number.isInteger(maxDetections) || maxDetections < 1) {
          throw new Error("Max detections (`max_det`) must be an integer >= 1.");
        }
        return {
          replace_existing: detectModalReplaceExistingInput.checked,
          confidence_threshold: confidence,
          iou_threshold: iou,
          image_size: imageSize,
          max_detections: maxDetections,
          agnostic_nms: detectModalAgnosticNmsInput.checked,
        };
      }

      async function detectLayouts(payloadBody) {
        detectBtn.disabled = true;
        detectModalRunBtn.disabled = true;
        try {
          const payload = await fetchJson(`/api/pages/${pageId}/layouts/detect`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payloadBody),
          });
          clearLayoutDraftState();
          closeDetectModal();
          const params = payload.inference_params || {};
          setStatus(
            `Redetect finished. Created ${payload.created} layouts. conf=${params.confidence_threshold}, iou=${params.iou_threshold}, imgsz=${params.image_size}, max_det=${params.max_detections}, agnostic_nms=${params.agnostic_nms}.`,
          );
          await loadPage();
          await loadLayouts();
          await refreshNextReviewButton();
        } catch (error) {
          setStatus(`Redetect failed: ${error.message}`, { isError: true });
        } finally {
          detectBtn.disabled = false;
          detectModalRunBtn.disabled = false;
        }
      }

      async function addLayout() {
        addBtn.disabled = true;
        try {
          await fetchJson(`/api/pages/${pageId}/layouts`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              class_name: "text",
              reading_order: null,
              bbox: { x1: 0.1, y1: 0.1, x2: 0.9, y2: 0.2 },
            }),
          });
          setStatus("Manual layout added.");
          await loadPage();
          await loadLayouts();
          await refreshNextReviewButton();
        } catch (error) {
          setStatus(`Add failed: ${error.message}`, { isError: true });
        } finally {
          addBtn.disabled = false;
        }
      }

      async function markReviewed() {
        reviewBtn.disabled = true;
        try {
          const deletedIds = Array.from(state.deletedLayoutIds).sort((a, b) => a - b);
          const editedEntries = Object.entries(state.localEditsById).sort(
            ([a], [b]) => Number(a) - Number(b),
          );

          for (const layoutId of deletedIds) {
            await fetchJson(`/api/layouts/${layoutId}`, { method: "DELETE" });
          }

          for (const [layoutId, draft] of editedEntries) {
            if (state.deletedLayoutIds.has(Number(layoutId))) {
              continue;
            }
            await fetchJson(`/api/layouts/${layoutId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(draft),
            });
          }

          const payload = await fetchJson(`/api/pages/${pageId}/layouts/review-complete`, {
            method: "POST",
          });
          clearLayoutDraftState();

          const nextPayload = await fetchJson(`/api/pages/${pageId}/layout-review-next`);
          const nextUrl = nextLayoutReviewUrl(nextPayload);
          if (nextUrl) {
            window.location.href = nextUrl;
            return;
          }

          setStatus(
            `Page marked reviewed with ${payload.layout_count} layouts. No more pages are waiting for layout review.`,
          );
          await loadPage();
          await loadLayouts();
          await refreshNextReviewButton();
        } catch (error) {
          setStatus(`Mark reviewed failed: ${error.message}`, { isError: true });
        } finally {
          reviewBtn.disabled = false;
        }
      }

      detectBtn.addEventListener("click", () => {
        openDetectModal();
      });
      addBtn.addEventListener("click", addLayout);
      reviewBtn.addEventListener("click", markReviewed);
      historyBackBtn.addEventListener("click", () => {
        const targetPageId = previousHistoryPageId(state.reviewHistory, state.reviewHistoryIndex);
        if (!Number.isInteger(targetPageId) || targetPageId <= 0) {
          return;
        }
        state.reviewHistoryIndex = Math.max(0, state.reviewHistoryIndex - 1);
        persistReviewHistory();
        window.location.href = `/static/layouts.html?page_id=${targetPageId}`;
      });
      historyForthBtn.addEventListener("click", () => {
        const nextPageId = Number(state.nextReviewPageId);
        if (!Number.isInteger(nextPageId) || nextPageId <= 0) {
          return;
        }
        window.location.href = `/static/layouts.html?page_id=${nextPageId}`;
      });
      detectModalRunBtn.addEventListener("click", async () => {
        let payloadBody;
        try {
          payloadBody = parseDetectModalPayload();
        } catch (error) {
          setStatus(`Redetect failed: ${error.message}`, { isError: true });
          return;
        }
        await detectLayouts(payloadBody);
      });
      detectModalCancelBtn.addEventListener("click", () => {
        closeDetectModal();
      });
      detectModal.addEventListener("pointerdown", (event) => {
        if (event.target === detectModal) {
          closeDetectModal();
        }
      });
      zoomTrigger.addEventListener("click", () => {
        if (zoomMenu.hidden) {
          openZoomMenu();
        } else {
          closeZoomMenu();
        }
      });
      zoomMenu.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) {
          return;
        }
        const option = target.closest(".zoom-option");
        if (!(option instanceof HTMLButtonElement)) {
          return;
        }
        const mode = option.dataset.zoomMode;
        const percent = option.dataset.zoomPercent;
        if (mode) {
          setZoomMode(mode);
        } else if (percent) {
          setCustomZoomPercent(Number(percent));
        }
        closeZoomMenu();
      });
      zoomPercentInput.addEventListener("change", () => {
        applyCustomZoomFromInput();
      });
      zoomPercentInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          applyCustomZoomFromInput();
          zoomPercentInput.blur();
        }
      });
      document.addEventListener("pointerdown", (event) => {
        if (!(event.target instanceof Element)) {
          return;
        }
        if (event.target.closest(".zoom-control")) {
          return;
        }
        closeZoomMenu();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeZoomMenu();
          closeDetectModal();
        }
      });
      pageImage.addEventListener("load", () => {
        applyZoom();
      });

      if (typeof ResizeObserver !== "undefined") {
        const viewportResizeObserver = new ResizeObserver(() => {
          if (state.zoomMode !== "custom") {
            applyZoom();
          }
        });
        viewportResizeObserver.observe(imageViewport);
      } else {
        window.addEventListener("resize", () => {
          if (state.zoomMode !== "custom") {
            applyZoom();
          }
        });
      }

      async function init() {
        if (!Number.isInteger(pageId) || pageId <= 0) {
          setStatus("Missing or invalid page_id query parameter.", { isError: true });
          return;
        }
        try {
          applyStoredZoomSettings();
          loadReviewHistory();
          registerCurrentPageInHistory();
          loadLayoutDraftState();
          await loadPage();
          await loadLayouts();
          await refreshNextReviewButton();
          applyZoom();
          setStatus("Ready.");
        } catch (error) {
          setStatus(`Load failed: ${error.message}`, { isError: true });
        }
      }

      init();
    </script>
  </body>
</html>
