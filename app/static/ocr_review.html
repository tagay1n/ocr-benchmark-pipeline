<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR review | OCR benchmark pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <style>
      :root {
        --bg: #f3f1eb;
        --surface: #fffdf7;
        --ink: #1e1f1c;
        --muted: #63635f;
        --accent: #0b7a75;
        --danger: #a52222;
        --border: #e0dccf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 100% 0, #d6ebe7 0, transparent 30%),
          radial-gradient(circle at 0 100%, #f7e3cf 0, transparent 32%),
          var(--bg);
      }

      body.editor-resizing,
      body.editor-resizing * {
        cursor: ew-resize !important;
        user-select: none !important;
      }

      main {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      .nav-strip {
        position: fixed;
        top: 24px;
        left: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        z-index: 45;
      }

      .back-nav,
      .history-nav-btn {
        width: 44px;
        height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(31, 35, 41, 0.08);
      }

      .history-nav-btn {
        cursor: pointer;
      }

      .history-nav-btn:hover:not(:disabled),
      .back-nav:hover {
        background: #f5f1e6;
      }

      .history-nav-btn:disabled {
        opacity: 0.42;
        cursor: default;
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-top: 4px;
        padding-bottom: 8px;
        padding-left: 172px;
        background: rgba(243, 241, 235, 0.9);
        backdrop-filter: blur(1px);
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .header-title-row {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .subline {
        color: var(--muted);
      }

      .meta-strip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .review-state-badge {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--muted);
        background: #ece9df;
      }

      .review-state-badge.needs-review {
        color: #7a5a1d;
        border-color: #dfcba2;
        background: #f4ead2;
      }

      .review-state-badge.reviewed {
        color: #1c5e4f;
        border-color: #b9d8cc;
        background: #deeee7;
      }

      .review-state-badge.unknown {
        color: #4e4f49;
        border-color: #cfc8b7;
        background: #ece8df;
      }

      .actions {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .line-review-panel {
        margin-top: 8px;
        display: grid;
        grid-template-columns: minmax(200px, auto) minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f4f1e9;
        padding: 8px 10px;
      }

      .line-review-panel[hidden] {
        display: none;
      }

      .line-review-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .line-review-layout {
        font-weight: 600;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .line-review-progress {
        color: var(--muted);
        font-size: 13px;
      }

      .line-review-compare {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 4px;
        min-width: 0;
      }

      .line-review-line-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 6px;
      }

      .line-review-line-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .line-review-line {
        border: 1px solid #d6d0c4;
        border-radius: 6px;
        background: #fbf9f4;
        padding: 3px 8px;
        min-height: 24px;
        font-size: 12px;
        line-height: 1.3;
        color: #2a2c2f;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .line-review-line.is-current {
        border-color: #6aa7a2;
        background: #eef8f6;
      }

      .line-review-line.is-changed {
        border-color: #c98d5d;
        background: #f9efe5;
      }

      .line-review-actions {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }

      .line-review-approve.approved {
        border-color: #1b8d77;
        background: #1b8d77;
      }

      .zoom-control {
        position: relative;
      }

      .magnifier-toggle-btn {
        width: 38px;
        height: 38px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        border: 1px solid var(--border);
        background: #ece8df;
        color: var(--ink);
      }

      .magnifier-toggle-btn:hover {
        background: #e3ddd1;
      }

      .magnifier-toggle-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .magnifier-icon {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-combo {
        display: inline-flex;
        position: relative;
        height: 38px;
        border: 1px solid #9aa99f;
        border-radius: 10px;
        overflow: hidden;
        background: var(--surface);
      }

      .zoom-percent-input {
        width: 58px;
        height: 100%;
        border: 0;
        border-radius: 0;
        padding: 0 8px;
        text-align: right;
        background: transparent;
        color: var(--ink);
        font-weight: 600;
      }

      .zoom-percent-input:focus {
        outline: none;
      }

      .zoom-caret-btn {
        width: 30px;
        height: 100%;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--border);
        border-radius: 0;
        background: #ece8df;
        color: var(--ink);
        font-size: 13px;
        line-height: 1;
        align-items: stretch;
      }

      .zoom-caret-btn:hover {
        background: #e3ddd1;
      }

      .zoom-caret {
        opacity: 0.75;
      }

      .zoom-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 172px;
        padding: 8px 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 14px 32px rgba(31, 35, 41, 0.14);
        z-index: 40;
      }

      .zoom-menu[hidden] {
        display: none;
      }

      .zoom-option {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: inherit;
        padding: 6px 12px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
      }

      .zoom-option:hover {
        background: #f0ece1;
      }

      .zoom-option.active::after {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }

      .zoom-separator {
        height: 1px;
        margin: 6px 0;
        background: var(--border);
      }

      .panel-toggles {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f3f0e7;
        padding: 4px;
      }

      .toggle-btn {
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 10px;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      button.secondary {
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(18, 23, 25, 0.52);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 30;
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .modal-card {
        width: min(620px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      .modal-card h2 {
        margin: 0 0 8px;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .modal-field label {
        font-size: 13px;
        color: var(--muted);
      }

      .modal-input,
      .modal-textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #fff;
      }

      .modal-textarea {
        min-height: 168px;
        resize: vertical;
        white-space: pre-wrap;
      }

      .modal-actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .modal-layout-list {
        max-height: 250px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      .modal-layout-select-all {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        cursor: pointer;
      }

      .modal-layout-select-all input {
        margin: 0;
      }

      .modal-layout-option {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        font-size: 14px;
        line-height: 1.25;
        cursor: pointer;
      }

      .modal-layout-option + .modal-layout-option {
        border-top: 1px solid #ebe6da;
      }

      .modal-layout-option input {
        margin: 0;
      }

      .modal-layout-empty {
        padding: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .modal-layout-text {
        min-width: 0;
        flex: 1 1 auto;
      }

      .modal-layout-main {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .modal-layout-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        flex: 0 0 auto;
      }

      .modal-layout-title {
        font-weight: 600;
      }

      .modal-layout-meta {
        margin-top: 3px;
        font-size: 12px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #reextract-modal-run-btn {
        position: relative;
      }

      #reextract-modal-run-btn.is-busy {
        padding-right: 34px;
      }

      #reextract-modal-run-btn.is-busy::after {
        content: "";
        position: absolute;
        top: 50%;
        right: 12px;
        width: 14px;
        height: 14px;
        margin-top: -7px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.36);
        border-top-color: rgba(255, 255, 255, 0.96);
        animation: reextract-modal-spin 720ms linear infinite;
      }

      @keyframes reextract-modal-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .grid {
        margin-top: 14px;
        margin-left: -22px;
        margin-right: -22px;
        width: calc(100% + 44px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        gap: 2px;
        align-items: stretch;
        flex: 1 1 auto;
        min-height: 0;
      }

      .grid.view-mode-line-by-line {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .image-panel {
        overflow: hidden;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .panel-hidden {
        display: none !important;
      }

      .reconstructed-floating-controls {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 7;
        display: inline-flex;
        align-items: center;
        opacity: 1;
        transform: translateY(0);
        transition: opacity 180ms ease, transform 180ms ease;
        visibility: visible;
      }

      .reconstructed-floating-controls.is-idle {
        opacity: 0.36;
        transform: translateY(-2px);
        pointer-events: none;
      }

      .reconstructed-floating-controls .render-mode-toggle {
        box-shadow: 0 6px 16px rgba(26, 30, 34, 0.16);
      }

      .render-mode-toggle {
        padding: 4px;
        border-radius: 10px;
        background: #f3f0e7;
      }

      .render-mode-btn {
        min-height: 28px;
        padding: 5px 10px;
        font-size: 12px;
      }

      .preview-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: auto;
        background: #f7f5ef;
      }

      .preview-wrap {
        position: relative;
        width: max-content;
        margin: 24px auto 0;
      }

      #page-image {
        display: block;
        width: auto;
        height: auto;
        max-width: none;
      }

      #reconstruction-surface {
        position: relative;
        background: #ffffff;
        overflow: visible;
      }

      .recon-item {
        position: absolute;
        border: 1px dashed #9ca8a2;
        border-radius: 4px;
        padding: 0;
        overflow: visible;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        font-size: 11px;
        line-height: 1.25;
        color: #1e1f1c;
        background: rgba(255, 255, 255, 0.94);
        cursor: pointer;
      }

      .recon-item.recon-selected {
        border-style: solid;
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.18);
      }

      .recon-item.modal-hovered {
        outline: 2px dashed rgba(11, 122, 117, 0.74);
        outline-offset: 2px;
      }

      .recon-item-content {
        position: relative;
        z-index: 3;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        overflow: hidden;
        font-size: 12px;
        line-height: 1.1;
        text-align: left;
        transform-origin: top left;
      }

      .recon-item-content.markdown-rendered {
        white-space: normal;
      }

      .recon-item-content.markdown-rendered p,
      .recon-item-content.markdown-rendered ul,
      .recon-item-content.markdown-rendered ol,
      .recon-item-content.markdown-rendered h1,
      .recon-item-content.markdown-rendered h2,
      .recon-item-content.markdown-rendered h3,
      .recon-item-content.markdown-rendered h4,
      .recon-item-content.markdown-rendered h5,
      .recon-item-content.markdown-rendered h6,
      .recon-item-content.markdown-rendered blockquote,
      .recon-item-content.markdown-rendered pre,
      .recon-item-content.markdown-rendered table {
        margin: 0;
      }

      .recon-item-content.markdown-rendered a {
        color: #225e8a;
        text-decoration: underline;
      }

      .recon-item-content.markdown {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .recon-item-content.latex {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }

      .recon-item-content.skip {
        color: #8a8578;
        font-style: italic;
      }

      .recon-item-content.picture-crop {
        position: relative;
        background: #f6f3ea;
      }

      .recon-item-crop-image {
        position: absolute;
        max-width: none;
        max-height: none;
        user-select: none;
        pointer-events: none;
        -webkit-user-drag: none;
      }

      .recon-item-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 auto;
      }

      .recon-item-content th,
      .recon-item-content td {
        border: 1px solid #d0cbc0;
        padding: 2px 4px;
        font-size: inherit;
        text-align: left;
      }

      .recon-item.markdown-table-warning {
        border-color: #c16a22;
        box-shadow: 0 0 0 1px rgba(193, 106, 34, 0.25);
      }

      .recon-warning-badge {
        position: absolute;
        top: 3px;
        right: 3px;
        z-index: 1;
        border-radius: 999px;
        border: 1px solid #c16a22;
        background: #f7e6d8;
        color: #6f3a0f;
        font-size: 10px;
        line-height: 1;
        padding: 2px 6px;
        pointer-events: none;
      }

      .recon-warning-badge.lookalike {
        top: 22px;
        border-color: #9c4f96;
        background: #f3e4f0;
        color: #5d2c5a;
      }

      .recon-line-warning {
        position: absolute;
        left: 0;
        right: 0;
        background: rgba(156, 79, 150, 0.16);
        pointer-events: none;
        z-index: 0;
      }

      .recon-line-highlight {
        position: absolute;
        left: 0;
        right: 0;
        background: rgba(11, 122, 117, 0.18);
        pointer-events: none;
        z-index: 2;
      }

      .recon-line-status {
        position: absolute;
        left: 0;
        right: 0;
        pointer-events: none;
        z-index: 1;
      }

      .recon-line-status.approved {
        background: rgba(38, 130, 104, 0.15);
      }

      .recon-line-status.current {
        background: rgba(36, 121, 151, 0.18);
        box-shadow: inset 0 0 0 1px rgba(36, 121, 151, 0.22);
      }

      .box-line-highlight {
        position: absolute;
        left: 0;
        right: 0;
        background: rgba(11, 122, 117, 0.26);
        pointer-events: none;
        z-index: 3;
      }

      .box-line-status {
        position: absolute;
        left: 0;
        right: 0;
        pointer-events: none;
        z-index: 2;
      }

      .box-line-status.approved {
        background: rgba(38, 130, 104, 0.18);
      }

      .box-line-status.current {
        background: rgba(36, 121, 151, 0.22);
        box-shadow: inset 0 0 0 1px rgba(36, 121, 151, 0.28);
      }

      .box-line-warning {
        position: absolute;
        left: 0;
        right: 0;
        background: rgba(156, 79, 150, 0.24);
        pointer-events: none;
        z-index: 1;
      }

      #source-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      .focused-strip-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .focused-strip-mask {
        position: absolute;
        left: 0;
        right: 0;
        background: rgba(247, 245, 239, 0.62);
      }

      .focused-strip-boundary {
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(11, 122, 117, 0.72);
      }

      #reconstructed-strip-overlay .focused-strip-mask {
        background: rgba(247, 245, 239, 0.52);
      }

      #source-label-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      #source-bind-lines-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      #source-label-layer-selected {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .box {
        position: absolute;
        border: 1px solid #0b7a75;
        background: rgba(11, 122, 117, 0.12);
        border-radius: 4px;
        cursor: pointer;
      }

      .box.layout-selected {
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.2);
      }

      .box.modal-hovered {
        outline: 2px dashed rgba(11, 122, 117, 0.74);
        outline-offset: 2px;
      }

      .box-label {
        position: absolute;
        top: calc(-20px * var(--overlay-badge-scale, 1));
        left: 0;
        font-size: calc(12px * var(--overlay-badge-scale, 1));
        background: rgba(255, 253, 247, 0.58);
        color: #1e1f1c;
        border: 1px solid #cfc8b7;
        border-radius: calc(6px * var(--overlay-badge-scale, 1));
        padding: calc(2px * var(--overlay-badge-scale, 1)) calc(6px * var(--overlay-badge-scale, 1));
        white-space: nowrap;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
        z-index: 3;
      }

      .source-box-label {
        transform: translateY(calc(-20px * var(--overlay-badge-scale, 1)));
      }

      .recon-restore-btn {
        position: absolute;
        top: -20px;
        right: 0;
        width: 20px;
        height: 20px;
        padding: 0;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1;
        z-index: 1;
      }

      .editor-drawer {
        --expanded-editor-font-size: 13px;
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(780px, 52vw);
        background: var(--surface);
        border-left: 1px solid var(--border);
        box-shadow: -10px 0 28px rgba(24, 31, 37, 0.18);
        z-index: 60;
        display: flex;
        flex-direction: column;
      }

      .editor-drawer[hidden] {
        display: none;
      }

      .editor-resize-handle {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 12px;
        transform: translateX(-50%);
        cursor: ew-resize;
        z-index: 70;
        touch-action: none;
      }

      .editor-resize-handle::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        transform: translateX(-50%);
        background: rgba(121, 111, 89, 0.32);
      }

      .editor-resize-handle[hidden] {
        display: none;
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }

      .editor-title-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .editor-header-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .editor-font-size-control {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        padding-left: 6px;
        border-left: 1px solid #d7d0be;
      }

      .editor-font-size-value {
        min-width: 44px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }

      .editor-wrap-btn {
        min-height: 30px;
        min-width: 72px;
      }

      .editor-header h2 {
        margin: 0;
        font-size: 16px;
      }

      .editor-mode-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid #c9c3b1;
        background: #f0ede3;
        color: #5d594f;
        font-size: 11px;
        line-height: 1;
        padding: 3px 8px;
      }

      .editor-mode-badge.codemirror {
        border-color: #1f7b74;
        background: #e7f2f1;
        color: #155a55;
      }

      .editor-mode-badge.fallback {
        border-color: #9a7a43;
        background: #f3ead8;
        color: #6f5322;
      }

      .editor-body {
        flex: 1 1 auto;
        min-height: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .editor-toolbar {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .editor-toolbar[hidden] {
        display: none;
      }

      .editor-tool-btn {
        min-height: 30px;
        padding: 4px 10px;
        font-size: 12px;
        line-height: 1;
      }

      .editor-textarea {
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: var(--expanded-editor-font-size);
        line-height: 1.45;
        resize: none;
      }

      .editor-cm {
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        background: #ffffff;
      }

      .editor-cm[hidden] {
        display: none;
      }

      .editor-cm .cm-editor {
        height: 100%;
      }

      .editor-cm .cm-scroller {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: var(--expanded-editor-font-size);
        line-height: 1.45;
      }

      .editor-cm .cm-gutters {
        background: #f4f2eb;
        border-right: 1px solid #ddd7c7;
      }

      .editor-status {
        min-height: 22px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2px 8px;
        font-size: 12px;
        color: #5e5a50;
        background: #f3f0e7;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .editor-validation {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .editor-validation[hidden] {
        display: none;
      }

      .editor-validation-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid #9a7a43;
        background: #f3ead8;
        color: #6f5322;
        font-size: 11px;
        line-height: 1;
        padding: 3px 8px;
      }

      @media (max-width: 1120px) {
        .editor-drawer {
          width: 100%;
        }
      }

      @media (max-width: 1120px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 980px) {
        .header {
          padding-left: 0;
          margin-top: 56px;
          flex-direction: column;
          align-items: flex-start;
        }

        .line-review-panel {
          grid-template-columns: 1fr;
        }

        .line-review-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="nav-strip" aria-label="Navigation">
        <a class="back-nav" href="/" aria-label="Back to Dashboard" title="Back to Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10 7 5 12l5 5"></path>
            <path d="M5 12h9a5 5 0 0 0 0-10h-2"></path>
          </svg>
        </a>
        <button id="history-back-btn" class="history-nav-btn" type="button" aria-label="Previous reviewed page" title="Previous reviewed page" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>
        <button id="history-forth-btn" class="history-nav-btn" type="button" aria-label="Next page for OCR review" title="Next page for OCR review" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m9 6 6 6-6 6"></path>
          </svg>
        </button>
      </nav>

      <section class="header">
        <div class="header-title-row">
          <h1>OCR review</h1>
          <div class="meta-strip">
            <span id="page-meta" class="subline"></span>
            <span id="review-state-badge" class="review-state-badge unknown" hidden></span>
          </div>
        </div>
        <div class="actions">
          <div class="zoom-control">
            <div class="zoom-combo">
              <input id="zoom-percent-input" class="zoom-percent-input" type="number" min="1" max="400" step="1" value="100" aria-label="Zoom percent" />
              <button id="zoom-trigger" class="zoom-caret-btn" type="button" aria-label="Open zoom presets" aria-haspopup="true" aria-expanded="false">
                <span class="zoom-caret">▾</span>
              </button>
            </div>
            <div id="zoom-menu" class="zoom-menu" hidden>
              <button class="zoom-option" type="button" data-zoom-mode="fit-page">Fit page</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-width">Fit width</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-height">Fit height</button>
              <button class="zoom-option" type="button" data-zoom-mode="automatic">Automatic</button>
              <div class="zoom-separator"></div>
            </div>
          </div>
          <button id="magnifier-toggle-btn" class="magnifier-toggle-btn" type="button" aria-label="Toggle magnifier" aria-pressed="false" title="Magnifier (M)">
            <svg class="magnifier-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m20 20-4.2-4.2"></path>
            </svg>
          </button>
          <div class="panel-toggles" role="group" aria-label="Panel visibility">
            <button id="toggle-source-btn" class="toggle-btn active" type="button" aria-pressed="true">Source</button>
            <button id="toggle-reconstructed-btn" class="toggle-btn active" type="button" aria-pressed="true">Reconstructed</button>
          </div>
          <div class="panel-toggles" role="group" aria-label="Review mode">
            <button id="view-two-panels-btn" class="toggle-btn active" type="button" aria-pressed="true">Two panels</button>
            <button id="view-line-by-line-btn" class="toggle-btn" type="button" aria-pressed="false">Line by line</button>
          </div>
          <button id="reextract-btn" type="button">Detect</button>
          <button id="review-btn" type="button">Mark reviewed</button>
        </div>
      </section>

      <section id="line-review-panel" class="line-review-panel" hidden>
        <div class="line-review-meta">
          <div id="line-review-layout" class="line-review-layout"></div>
          <div id="line-review-progress" class="line-review-progress"></div>
        </div>
        <div class="line-review-compare">
          <div class="line-review-line-row">
            <span class="line-review-line-label">Baseline</span>
            <div id="line-review-baseline-text" class="line-review-line"></div>
          </div>
          <div class="line-review-line-row">
            <span class="line-review-line-label">Current</span>
            <div id="line-review-current-text" class="line-review-line is-current"></div>
          </div>
        </div>
        <div class="line-review-actions">
          <button id="line-review-prev-btn" class="secondary" type="button">Prev (↑)</button>
          <button id="line-review-approve-btn" class="line-review-approve" type="button">Approve + next (A)</button>
          <button id="line-review-next-btn" class="secondary" type="button">Next (↓)</button>
          <button id="line-review-approve-bbox-btn" class="secondary" type="button">Approve bbox</button>
          <button id="line-review-reset-bbox-btn" class="secondary" type="button">Reset bbox</button>
        </div>
      </section>

      <section class="grid">
        <section id="source-panel" class="panel image-panel">
          <div id="source-viewport" class="preview-viewport">
            <div id="source-wrap" class="preview-wrap">
              <img id="page-image" alt="Source page image" />
              <svg id="source-bind-lines-layer"></svg>
              <div id="source-label-layer"></div>
              <div id="source-label-layer-selected"></div>
              <div id="source-overlay"></div>
              <div id="source-strip-overlay" class="focused-strip-overlay" hidden>
                <div id="source-strip-top-mask" class="focused-strip-mask"></div>
                <div id="source-strip-top-boundary" class="focused-strip-boundary"></div>
                <div id="source-strip-bottom-mask" class="focused-strip-mask"></div>
                <div id="source-strip-bottom-boundary" class="focused-strip-boundary"></div>
              </div>
            </div>
          </div>
        </section>

        <section id="reconstructed-panel" class="panel image-panel">
          <div id="reconstructed-floating-controls" class="reconstructed-floating-controls">
            <div class="render-mode-toggle panel-toggles" role="group" aria-label="Reconstructed content mode">
              <button id="render-markdown-btn" class="render-mode-btn toggle-btn active" type="button" aria-pressed="true">Markdown</button>
              <button id="render-raw-btn" class="render-mode-btn toggle-btn" type="button" aria-pressed="false">Raw</button>
            </div>
          </div>
          <div id="reconstructed-viewport" class="preview-viewport">
            <div id="reconstructed-wrap" class="preview-wrap">
              <div id="reconstruction-surface"></div>
              <div id="reconstructed-strip-overlay" class="focused-strip-overlay" hidden>
                <div id="reconstructed-strip-top-mask" class="focused-strip-mask"></div>
                <div id="reconstructed-strip-top-boundary" class="focused-strip-boundary"></div>
                <div id="reconstructed-strip-bottom-mask" class="focused-strip-mask"></div>
                <div id="reconstructed-strip-bottom-boundary" class="focused-strip-boundary"></div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div id="reextract-modal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="reextract-modal-title">
        <h2 id="reextract-modal-title">Detect</h2>
        <div class="modal-field">
          <label class="modal-layout-select-all" for="reextract-modal-select-all">
            <input id="reextract-modal-select-all" type="checkbox" />
            <span>Select all</span>
          </label>
          <div id="reextract-modal-layouts" class="modal-layout-list" role="group" aria-label="Layouts"></div>
        </div>
        <div class="modal-grid">
          <div class="modal-field">
            <label for="reextract-modal-temperature">Temperature (0..2)</label>
            <input id="reextract-modal-temperature" class="modal-input" type="number" min="0" max="2" step="0.1" value="0" />
          </div>
          <div class="modal-field">
            <label for="reextract-modal-max-retries">Max retries per layout</label>
            <input id="reextract-modal-max-retries" class="modal-input" type="number" min="1" max="10" step="1" value="3" />
          </div>
        </div>
        <div class="modal-actions">
          <button id="reextract-modal-cancel-btn" class="secondary" type="button">Cancel</button>
          <button id="reextract-modal-run-btn" type="button">Run</button>
        </div>
      </div>
    </div>

    <aside id="expanded-editor" class="editor-drawer" role="dialog" aria-modal="true" aria-labelledby="expanded-editor-title" hidden>
      <div id="expanded-editor-resize-handle" class="editor-resize-handle" aria-hidden="true"></div>
      <div class="editor-header">
        <div class="editor-title-row">
          <h2 id="expanded-editor-title">Edit content</h2>
          <div id="expanded-editor-mode-badge" class="editor-mode-badge" hidden>CodeMirror</div>
        </div>
        <div class="editor-header-actions">
          <button id="expanded-editor-close-btn" type="button" aria-label="Close expanded editor">✕</button>
        </div>
      </div>
      <div class="editor-body">
        <div id="expanded-editor-toolbar" class="editor-toolbar" hidden>
          <button id="editor-action-bold" class="secondary editor-tool-btn" type="button" title="Bold (Ctrl/Cmd+B)">
            B
          </button>
          <button id="editor-action-italic" class="secondary editor-tool-btn" type="button" title="Italic (Ctrl/Cmd+I)">
            I
          </button>
          <button
            id="editor-action-inline-formula"
            class="secondary editor-tool-btn"
            type="button"
            title="Inline formula (Ctrl/Cmd+Shift+E)"
          >
            fx
          </button>
          <button
            id="editor-action-list-item"
            class="secondary editor-tool-btn"
            type="button"
            title="List item (Ctrl/Cmd+Shift+8)"
          >
            •
          </button>
          <button
            id="editor-action-ordered-list-item"
            class="secondary editor-tool-btn"
            type="button"
            title="Ordered list item (Ctrl/Cmd+Shift+7)"
          >
            1.
          </button>
          <button id="expanded-editor-wrap-btn" class="secondary editor-tool-btn editor-wrap-btn" type="button">Wrap on</button>
          <div class="editor-font-size-control" aria-label="Editor text size">
            <button
              id="editor-font-size-decrease-btn"
              class="secondary editor-tool-btn"
              type="button"
              title="Decrease text size"
            >
              A-
            </button>
            <span id="editor-font-size-value" class="editor-font-size-value">13px</span>
            <button
              id="editor-font-size-increase-btn"
              class="secondary editor-tool-btn"
              type="button"
              title="Increase text size"
            >
              A+
            </button>
          </div>
        </div>
        <div id="expanded-editor-cm" class="editor-cm" hidden></div>
        <textarea id="expanded-editor-textarea" class="editor-textarea" spellcheck="false"></textarea>
        <div id="expanded-editor-status" class="editor-status">
          <span id="expanded-editor-status-text">Ln 1, Col 1 | 0 chars</span>
          <div id="expanded-editor-validation" class="editor-validation" hidden></div>
        </div>
      </div>
    </aside>

    <script type="module" src="/static/js/ocr_review_page.mjs"></script>
  </body>
</html>
