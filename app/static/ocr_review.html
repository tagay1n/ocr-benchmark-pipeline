<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR review | OCR benchmark pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <style>
      :root {
        --bg: #f3f1eb;
        --surface: #fffdf7;
        --ink: #1e1f1c;
        --muted: #63635f;
        --accent: #0b7a75;
        --danger: #a52222;
        --border: #e0dccf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 100% 0, #d6ebe7 0, transparent 30%),
          radial-gradient(circle at 0 100%, #f7e3cf 0, transparent 32%),
          var(--bg);
      }

      main {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      .nav-strip {
        position: absolute;
        top: 24px;
        left: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .back-nav,
      .history-nav-btn {
        width: 44px;
        height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(31, 35, 41, 0.08);
      }

      .history-nav-btn {
        cursor: pointer;
      }

      .history-nav-btn:hover:not(:disabled),
      .back-nav:hover {
        background: #f5f1e6;
      }

      .history-nav-btn:disabled {
        opacity: 0.42;
        cursor: default;
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-left: 172px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .subline {
        color: var(--muted);
      }

      .meta-strip {
        margin-top: 4px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .review-state-badge {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--muted);
        background: #ece9df;
      }

      .review-state-badge.needs-review {
        color: #7a5a1d;
        border-color: #dfcba2;
        background: #f4ead2;
      }

      .review-state-badge.reviewed {
        color: #1c5e4f;
        border-color: #b9d8cc;
        background: #deeee7;
      }

      .review-state-badge.unknown {
        color: #4e4f49;
        border-color: #cfc8b7;
        background: #ece8df;
      }

      .actions {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .zoom-control {
        position: relative;
      }

      .zoom-combo {
        display: inline-flex;
        position: relative;
        height: 38px;
        border: 1px solid #9aa99f;
        border-radius: 10px;
        overflow: hidden;
        background: var(--surface);
      }

      .zoom-percent-input {
        width: 58px;
        height: 100%;
        border: 0;
        border-radius: 0;
        padding: 0 8px;
        text-align: right;
        background: transparent;
        color: var(--ink);
        font-weight: 600;
      }

      .zoom-percent-input:focus {
        outline: none;
      }

      .zoom-caret-btn {
        width: 30px;
        height: 100%;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--border);
        border-radius: 0;
        background: #ece8df;
        color: var(--ink);
        font-size: 13px;
        line-height: 1;
        align-items: stretch;
      }

      .zoom-caret-btn:hover {
        background: #e3ddd1;
      }

      .zoom-caret {
        opacity: 0.75;
      }

      .zoom-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 172px;
        padding: 8px 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 14px 32px rgba(31, 35, 41, 0.14);
        z-index: 40;
      }

      .zoom-menu[hidden] {
        display: none;
      }

      .zoom-option {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: inherit;
        padding: 6px 12px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
      }

      .zoom-option:hover {
        background: #f0ece1;
      }

      .zoom-option.active::after {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
      }

      .zoom-separator {
        height: 1px;
        margin: 6px 0;
        background: var(--border);
      }

      .panel-toggles {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f3f0e7;
        padding: 4px;
      }

      .toggle-btn {
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 10px;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      button.secondary {
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .status-line {
        margin-top: 10px;
        color: var(--muted);
      }

      .status-line.error {
        color: var(--danger);
      }

      .grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
        gap: 16px;
        align-items: stretch;
        flex: 1 1 auto;
        min-height: 0;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .image-panel {
        overflow: hidden;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .outputs-panel {
        min-height: 0;
        overflow: auto;
      }

      .panel-hidden {
        display: none !important;
      }

      .image-panel-header {
        margin: 0 0 8px;
      }

      .image-panel-header h2 {
        margin: 0;
      }

      .preview-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: auto;
        background: #f7f5ef;
      }

      .preview-wrap {
        position: relative;
        width: max-content;
        margin: 0 auto;
      }

      #page-image {
        display: block;
        width: auto;
        height: auto;
        max-width: none;
      }

      #reconstruction-surface {
        position: relative;
        background: #ffffff;
        overflow: hidden;
      }

      .recon-item {
        position: absolute;
        border: 1px dashed #9ca8a2;
        border-radius: 4px;
        padding: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        line-height: 1.25;
        color: #1e1f1c;
        background: rgba(255, 255, 255, 0.94);
        cursor: pointer;
      }

      .recon-item.recon-selected {
        border-style: solid;
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.18);
      }

      .recon-item-content {
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        max-width: 100%;
        max-height: 100%;
        overflow: hidden;
        font-size: 12px;
        line-height: 1.25;
        text-align: center;
      }

      .recon-item-content.markdown {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .recon-item-content.latex {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }

      .recon-item-content.skip {
        color: #8a8578;
        font-style: italic;
      }

      .recon-item-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 auto;
      }

      .recon-item-content th,
      .recon-item-content td {
        border: 1px solid #d0cbc0;
        padding: 2px 4px;
        font-size: inherit;
        text-align: left;
      }

      #source-overlay {
        position: absolute;
        inset: 0;
      }

      .box {
        position: absolute;
        border: 1px solid #0b7a75;
        background: rgba(11, 122, 117, 0.12);
        border-radius: 4px;
        cursor: pointer;
      }

      .box.layout-selected {
        border-width: 2px;
        box-shadow: 0 0 0 2px rgba(11, 122, 117, 0.2);
      }

      .box-label {
        position: absolute;
        top: -20px;
        left: 0;
        font-size: 12px;
        background: rgba(255, 253, 247, 0.92);
        color: #1e1f1c;
        border: 1px solid #cfc8b7;
        border-radius: 6px;
        padding: 2px 6px;
        white-space: nowrap;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .outputs-header {
        margin-bottom: 8px;
      }

      .outputs-header h2 {
        margin: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        font-size: 13px;
        color: var(--muted);
      }

      .outputs-table tr.output-selected {
        background: #f1f7f6;
      }

      .order-col {
        width: 1%;
        white-space: nowrap;
      }

      .class-col {
        width: 1%;
        white-space: nowrap;
      }

      .format-col {
        width: 1%;
        white-space: nowrap;
      }

      .actions-col {
        width: 1%;
        white-space: nowrap;
      }

      .format-badge {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        background: #f1eee5;
        text-transform: lowercase;
      }

      .content-input {
        width: 100%;
        min-height: 96px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        line-height: 1.4;
        resize: vertical;
      }

      .content-input:disabled {
        background: #f2efe6;
        color: #7a7770;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        padding: 0;
        line-height: 1;
        font-size: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .empty-state {
        color: var(--muted);
      }

      @media (max-width: 1120px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 980px) {
        .header {
          padding-left: 0;
          margin-top: 56px;
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="nav-strip" aria-label="Navigation">
        <a class="back-nav" href="/" aria-label="Back to Dashboard" title="Back to Dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10 7 5 12l5 5"></path>
            <path d="M5 12h9a5 5 0 0 0 0-10h-2"></path>
          </svg>
        </a>
        <button id="history-back-btn" class="history-nav-btn" type="button" aria-label="Previous reviewed page" title="Previous reviewed page" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>
        <button id="history-forth-btn" class="history-nav-btn" type="button" aria-label="Next page for OCR review" title="Next page for OCR review" disabled>
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="m9 6 6 6-6 6"></path>
          </svg>
        </button>
      </nav>

      <section class="header">
        <div>
          <h1>OCR review</h1>
          <div class="meta-strip">
            <span id="review-state-badge" class="review-state-badge unknown" hidden></span>
            <span id="page-meta" class="subline"></span>
          </div>
        </div>
        <div class="actions">
          <div class="zoom-control">
            <div class="zoom-combo">
              <input id="zoom-percent-input" class="zoom-percent-input" type="number" min="1" max="400" step="1" value="100" aria-label="Zoom percent" />
              <button id="zoom-trigger" class="zoom-caret-btn" type="button" aria-label="Open zoom presets" aria-haspopup="true" aria-expanded="false">
                <span class="zoom-caret">▾</span>
              </button>
            </div>
            <div id="zoom-menu" class="zoom-menu" hidden>
              <button class="zoom-option" type="button" data-zoom-mode="fit-page">Fit page</button>
              <button class="zoom-option" type="button" data-zoom-mode="fit-width">Fit width</button>
              <button class="zoom-option" type="button" data-zoom-mode="automatic">Automatic</button>
              <div class="zoom-separator"></div>
              <button class="zoom-option" type="button" data-zoom-percent="50">50%</button>
              <button class="zoom-option" type="button" data-zoom-percent="70">70%</button>
              <button class="zoom-option" type="button" data-zoom-percent="85">85%</button>
              <button class="zoom-option" type="button" data-zoom-percent="100">100%</button>
              <button class="zoom-option" type="button" data-zoom-percent="125">125%</button>
              <button class="zoom-option" type="button" data-zoom-percent="150">150%</button>
              <button class="zoom-option" type="button" data-zoom-percent="175">175%</button>
              <button class="zoom-option" type="button" data-zoom-percent="200">200%</button>
              <button class="zoom-option" type="button" data-zoom-percent="300">300%</button>
              <button class="zoom-option" type="button" data-zoom-percent="400">400%</button>
            </div>
          </div>
          <div class="panel-toggles" role="group" aria-label="Panel visibility">
            <button id="toggle-source-btn" class="toggle-btn active" type="button" aria-pressed="true">Source</button>
            <button id="toggle-reconstructed-btn" class="toggle-btn active" type="button" aria-pressed="true">Reconstructed</button>
            <button id="toggle-content-btn" class="toggle-btn active" type="button" aria-pressed="true">Content</button>
          </div>
          <button id="reextract-btn" type="button">Detect again</button>
          <button id="review-btn" type="button">Mark reviewed</button>
        </div>
      </section>

      <p id="status-line" class="status-line"></p>

      <section class="grid">
        <section id="source-panel" class="panel image-panel">
          <header class="image-panel-header">
            <h2>Source image</h2>
          </header>
          <div id="source-viewport" class="preview-viewport">
            <div id="source-wrap" class="preview-wrap">
              <img id="page-image" alt="Source page image" />
              <div id="source-overlay"></div>
            </div>
          </div>
        </section>

        <section id="reconstructed-panel" class="panel image-panel">
          <header class="image-panel-header">
            <h2>Reconstructed</h2>
          </header>
          <div id="reconstructed-viewport" class="preview-viewport">
            <div id="reconstructed-wrap" class="preview-wrap">
              <div id="reconstruction-surface"></div>
            </div>
          </div>
        </section>

        <section id="content-panel" class="panel outputs-panel">
          <div class="outputs-header">
            <h2>Extracted content</h2>
          </div>
          <table class="outputs-table">
            <thead>
              <tr>
                <th class="order-col">Order</th>
                <th class="class-col">Class</th>
                <th class="format-col">Format</th>
                <th>Content</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="outputs-body"></tbody>
          </table>
        </section>
      </section>
    </main>

    <script type="module">
      import {
        clampZoomPercent,
        computeZoomScale,
        computeViewportScrollTargetForLayoutId,
        normalizeReviewHistory,
        previousHistoryPageId,
        updateReviewHistoryOnVisit,
      } from "./js/layout_review_utils.mjs";

      const STORAGE_KEYS = {
        draftPrefix: "ocrReview.drafts",
        history: "ocrReview.history",
        historyIndex: "ocrReview.history.index",
        panelVisibility: "ocrReview.panelVisibility",
        zoomMode: "ocrReview.zoom.mode",
        zoomPercent: "ocrReview.zoom.percent",
      };

      const CLASS_COLORS = {
        title: "#8f4b63",
        section_header: "#355fa8",
        text: "#4f5d69",
        list_item: "#2f6f5f",
        table: "#6f7d2f",
        picture: "#8a6831",
        caption: "#496f98",
        footnote: "#7a6030",
        formula: "#7b5a95",
        page_header: "#3f6e69",
        page_footer: "#8b5949",
      };

      const FALLBACK_COLORS = ["#4e6f8f", "#7c5f90", "#3f7b69", "#8d6a3b", "#82605b", "#537987", "#6e6b3f"];

      const reviewBtn = document.getElementById("review-btn");
      const reextractBtn = document.getElementById("reextract-btn");
      const zoomTrigger = document.getElementById("zoom-trigger");
      const zoomMenu = document.getElementById("zoom-menu");
      const zoomOptions = Array.from(document.querySelectorAll(".zoom-option"));
      const zoomPercentInput = document.getElementById("zoom-percent-input");
      const toggleSourceBtn = document.getElementById("toggle-source-btn");
      const toggleReconstructedBtn = document.getElementById("toggle-reconstructed-btn");
      const toggleContentBtn = document.getElementById("toggle-content-btn");
      const grid = document.querySelector(".grid");
      const sourcePanel = document.getElementById("source-panel");
      const reconstructedPanel = document.getElementById("reconstructed-panel");
      const contentPanel = document.getElementById("content-panel");
      const outputsBody = document.getElementById("outputs-body");
      const pageImage = document.getElementById("page-image");
      const reconstructionSurface = document.getElementById("reconstruction-surface");
      const sourceOverlay = document.getElementById("source-overlay");
      const sourceViewport = document.getElementById("source-viewport");
      const reconstructedViewport = document.getElementById("reconstructed-viewport");
      const sourceWrap = document.getElementById("source-wrap");
      const reconstructedWrap = document.getElementById("reconstructed-wrap");
      const pageMeta = document.getElementById("page-meta");
      const statusLine = document.getElementById("status-line");
      const reviewStateBadge = document.getElementById("review-state-badge");
      const historyBackBtn = document.getElementById("history-back-btn");
      const historyForthBtn = document.getElementById("history-forth-btn");

      const state = {
        pageId: null,
        page: null,
        outputs: [],
        serverOutputsByLayoutId: {},
        localEditsByLayoutId: {},
        selectedLayoutId: null,
        reviewSubmitInProgress: false,
        reextractInProgress: false,
        zoomMode: "automatic",
        zoomPercent: 100,
        zoomAppliedPercent: 100,
        history: [],
        historyIndex: -1,
        panelVisibility: {
          source: true,
          reconstructed: true,
          content: true,
        },
      };

      function readStorage(key) {
        try {
          return window.localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch {
          // Ignore storage failures.
        }
      }

      function removeStorage(key) {
        try {
          window.localStorage.removeItem(key);
        } catch {
          // Ignore storage failures.
        }
      }

      function normalizePanelVisibility(rawValue) {
        let parsed = rawValue;
        if (typeof rawValue === "string") {
          try {
            parsed = JSON.parse(rawValue);
          } catch {
            parsed = null;
          }
        }
        const next = {
          source: true,
          reconstructed: true,
          content: true,
        };
        if (parsed && typeof parsed === "object") {
          if (typeof parsed.source === "boolean") next.source = parsed.source;
          if (typeof parsed.reconstructed === "boolean") next.reconstructed = parsed.reconstructed;
          if (typeof parsed.content === "boolean") next.content = parsed.content;
        }
        if (!next.source && !next.reconstructed && !next.content) {
          next.content = true;
        }
        return next;
      }

      function visiblePanelCount() {
        return Number(state.panelVisibility.source) + Number(state.panelVisibility.reconstructed) + Number(state.panelVisibility.content);
      }

      function applyPanelVisibility() {
        sourcePanel.classList.toggle("panel-hidden", !state.panelVisibility.source);
        reconstructedPanel.classList.toggle("panel-hidden", !state.panelVisibility.reconstructed);
        contentPanel.classList.toggle("panel-hidden", !state.panelVisibility.content);

        toggleSourceBtn.classList.toggle("active", state.panelVisibility.source);
        toggleSourceBtn.setAttribute("aria-pressed", state.panelVisibility.source ? "true" : "false");
        toggleReconstructedBtn.classList.toggle("active", state.panelVisibility.reconstructed);
        toggleReconstructedBtn.setAttribute("aria-pressed", state.panelVisibility.reconstructed ? "true" : "false");
        toggleContentBtn.classList.toggle("active", state.panelVisibility.content);
        toggleContentBtn.setAttribute("aria-pressed", state.panelVisibility.content ? "true" : "false");

        const visibleCount = Math.max(1, visiblePanelCount());
        grid.style.gridTemplateColumns = new Array(visibleCount).fill("minmax(0, 1fr)").join(" ");
        requestAnimationFrame(() => {
          applyZoom();
        });
        applySelectedStyles();
      }

      function persistPanelVisibility() {
        writeStorage(STORAGE_KEYS.panelVisibility, JSON.stringify(state.panelVisibility));
      }

      function togglePanel(panelKey) {
        if (!(panelKey in state.panelVisibility)) {
          return;
        }
        if (state.panelVisibility[panelKey] && visiblePanelCount() <= 1) {
          setStatus("At least one panel must stay visible.");
          return;
        }
        state.panelVisibility[panelKey] = !state.panelVisibility[panelKey];
        applyPanelVisibility();
        persistPanelVisibility();
      }

      function applyStoredZoomSettings() {
        state.zoomMode = "automatic";
        const storedPercent = readStorage(STORAGE_KEYS.zoomPercent);
        if (storedPercent !== null) {
          state.zoomPercent = clampZoomPercent(storedPercent);
        }
        state.zoomAppliedPercent = 100;
        setZoomInputFromApplied();
        updateZoomMenuSelection();
      }

      function closeZoomMenu() {
        zoomMenu.hidden = true;
        zoomTrigger.setAttribute("aria-expanded", "false");
      }

      function openZoomMenu() {
        zoomMenu.hidden = false;
        zoomTrigger.setAttribute("aria-expanded", "true");
      }

      function updateZoomMenuSelection() {
        for (const option of zoomOptions) {
          const optionMode = option.dataset.zoomMode || "";
          const optionPercent = option.dataset.zoomPercent || "";
          const modeMatch = optionMode !== "" && optionMode === state.zoomMode;
          const percentMatch =
            optionPercent !== "" &&
            state.zoomMode === "custom" &&
            Number(optionPercent) === Math.round(state.zoomPercent);
          option.classList.toggle("active", modeMatch || percentMatch);
        }
      }

      function setZoomInputFromApplied() {
        zoomPercentInput.value = String(Math.round(state.zoomAppliedPercent));
      }

      function activeZoomViewport() {
        if (state.panelVisibility.source && sourceViewport.clientWidth > 0 && sourceViewport.clientHeight > 0) {
          return sourceViewport;
        }
        if (
          state.panelVisibility.reconstructed &&
          reconstructedViewport.clientWidth > 0 &&
          reconstructedViewport.clientHeight > 0
        ) {
          return reconstructedViewport;
        }
        if (sourceViewport.clientWidth > 0 && sourceViewport.clientHeight > 0) {
          return sourceViewport;
        }
        if (reconstructedViewport.clientWidth > 0 && reconstructedViewport.clientHeight > 0) {
          return reconstructedViewport;
        }
        return null;
      }

      function centerPreviewInViewport(viewport, content) {
        const viewportWidth = viewport.clientWidth;
        const viewportHeight = viewport.clientHeight;
        const contentWidth = content.offsetWidth;
        const contentHeight = content.offsetHeight;
        if (!viewportWidth || !viewportHeight || !contentWidth || !contentHeight) {
          return;
        }
        viewport.scrollLeft = Math.max(0, Math.round((contentWidth - viewportWidth) / 2));
        viewport.scrollTop = Math.max(0, Math.round((contentHeight - viewportHeight) / 2));
      }

      function applyZoom() {
        const naturalWidth = Number(pageImage.naturalWidth);
        const naturalHeight = Number(pageImage.naturalHeight);
        if (!Number.isFinite(naturalWidth) || !Number.isFinite(naturalHeight) || naturalWidth <= 0 || naturalHeight <= 0) {
          return;
        }

        const viewport = activeZoomViewport();
        if (!viewport) {
          return;
        }

        const scale = computeZoomScale({
          mode: state.zoomMode,
          zoomPercent: state.zoomPercent,
          naturalWidth,
          naturalHeight,
          viewportWidth: Math.max(1, viewport.clientWidth),
          viewportHeight: Math.max(1, viewport.clientHeight),
        });
        if (!scale || !Number.isFinite(scale) || scale <= 0) {
          return;
        }

        const displayWidth = Math.max(1, Math.round(naturalWidth * scale));
        const displayHeight = Math.max(1, Math.round(naturalHeight * scale));
        const width = `${displayWidth}px`;
        const height = `${displayHeight}px`;

        pageImage.style.width = width;
        pageImage.style.height = height;
        sourceWrap.style.width = width;
        sourceWrap.style.height = height;
        reconstructedWrap.style.width = width;
        reconstructedWrap.style.height = height;
        reconstructionSurface.style.width = width;
        reconstructionSurface.style.height = height;

        state.zoomAppliedPercent = Math.round(scale * 1000) / 10;
        setZoomInputFromApplied();
        updateZoomMenuSelection();

        requestAnimationFrame(() => {
          if (state.panelVisibility.source) {
            centerPreviewInViewport(sourceViewport, sourceWrap);
          }
          if (state.panelVisibility.reconstructed) {
            centerPreviewInViewport(reconstructedViewport, reconstructedWrap);
          }
        });
      }

      function persistZoomSettings() {
        writeStorage(STORAGE_KEYS.zoomMode, state.zoomMode);
        writeStorage(STORAGE_KEYS.zoomPercent, String(Math.round(clampZoomPercent(state.zoomPercent))));
      }

      function setZoomMode(mode) {
        if (!["fit-page", "fit-width", "automatic"].includes(mode)) {
          return;
        }
        state.zoomMode = mode;
        applyZoom();
        persistZoomSettings();
      }

      function setCustomZoomPercent(percent) {
        state.zoomMode = "custom";
        state.zoomPercent = clampZoomPercent(percent);
        applyZoom();
        persistZoomSettings();
      }

      function applyCustomZoomFromInput() {
        const raw = Number(zoomPercentInput.value);
        if (!Number.isFinite(raw)) {
          setZoomInputFromApplied();
          return;
        }
        setCustomZoomPercent(raw);
      }

      function setStatus(message, { isError = false } = {}) {
        statusLine.textContent = message;
        statusLine.classList.toggle("error", isError);
      }

      function draftStorageKey() {
        return `${STORAGE_KEYS.draftPrefix}:${state.pageId}`;
      }

      function normalizeClassName(className) {
        return String(className || "")
          .trim()
          .toLowerCase()
          .replace(/[-/\s]+/g, "_");
      }

      function formatClassLabel(value) {
        const normalized = String(value || "")
          .replace(/_/g, " ")
          .trim()
          .toLowerCase();
        if (!normalized) return "";
        return normalized.charAt(0).toUpperCase() + normalized.slice(1);
      }

      function formatStatusLabel(value) {
        return String(value || "")
          .replace(/_/g, " ")
          .trim()
          .toUpperCase();
      }

      function hashString(value) {
        let hash = 0;
        for (let i = 0; i < value.length; i += 1) {
          hash = (hash << 5) - hash + value.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function colorForClass(className) {
        const normalized = normalizeClassName(className);
        if (CLASS_COLORS[normalized]) return CLASS_COLORS[normalized];
        return FALLBACK_COLORS[hashString(normalized) % FALLBACK_COLORS.length];
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const r = Number.parseInt(clean.slice(0, 2), 16);
        const g = Number.parseInt(clean.slice(2, 4), 16);
        const b = Number.parseInt(clean.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function hasDraftChanges() {
        return Object.keys(state.localEditsByLayoutId).length > 0;
      }

      function updateReviewBadge() {
        reviewStateBadge.classList.remove("needs-review", "reviewed", "unknown");
        const status = String(state.page?.status || "").trim();
        if (!status) {
          reviewStateBadge.hidden = true;
          reviewStateBadge.textContent = "";
          return;
        }
        reviewStateBadge.hidden = false;
        if (status === "ocr_done") {
          reviewStateBadge.textContent = "NEEDS REVIEW";
          reviewStateBadge.classList.add("needs-review");
          return;
        }
        if (status === "ocr_reviewed") {
          reviewStateBadge.textContent = "REVIEWED";
          reviewStateBadge.classList.add("reviewed");
          return;
        }
        reviewStateBadge.textContent = formatStatusLabel(status);
        reviewStateBadge.classList.add("unknown");
      }

      function updateReviewButtonState() {
        const alreadyReviewed = state.page?.status === "ocr_reviewed";
        if (state.reviewSubmitInProgress) {
          reviewBtn.textContent = "Saving...";
          reviewBtn.disabled = true;
          return;
        }
        if (state.reextractInProgress) {
          reviewBtn.textContent = "Mark reviewed";
          reviewBtn.disabled = true;
          return;
        }
        if (alreadyReviewed && !hasDraftChanges()) {
          reviewBtn.textContent = "REVIEWED";
          reviewBtn.disabled = true;
          return;
        }
        reviewBtn.textContent = "Mark reviewed";
        reviewBtn.disabled = false;
      }

      function updateReextractButtonState() {
        if (state.reextractInProgress) {
          reextractBtn.textContent = "Detecting...";
          reextractBtn.disabled = true;
          return;
        }
        reextractBtn.textContent = "Detect again";
        reextractBtn.disabled = state.reviewSubmitInProgress || !Number.isInteger(state.pageId) || state.pageId <= 0;
      }

      function updateReviewUiState() {
        updateReviewBadge();
        updateReviewButtonState();
        updateReextractButtonState();
      }

      function toDraftShape(output) {
        return {
          content: String(output.content ?? ""),
        };
      }

      function sameDraft(a, b) {
        return String(a.content) === String(b.content);
      }

      function loadDraftState() {
        state.localEditsByLayoutId = {};
        const raw = readStorage(draftStorageKey());
        if (!raw) {
          return;
        }
        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch {
          return;
        }
        if (!parsed || typeof parsed !== "object") return;
        const edits = parsed.edits;
        if (!edits || typeof edits !== "object") return;
        for (const [layoutIdRaw, value] of Object.entries(edits)) {
          const layoutId = Number(layoutIdRaw);
          if (!Number.isInteger(layoutId) || layoutId <= 0) continue;
          if (!value || typeof value !== "object") continue;
          state.localEditsByLayoutId[String(layoutId)] = {
            content: String(value.content ?? ""),
          };
        }
      }

      function persistDraftState() {
        const payload = { edits: state.localEditsByLayoutId };
        writeStorage(draftStorageKey(), JSON.stringify(payload));
        updateReviewUiState();
      }

      function clearDraftState() {
        state.localEditsByLayoutId = {};
        removeStorage(draftStorageKey());
        updateReviewUiState();
      }

      function applyDraftsToOutputs() {
        state.outputs = state.outputs.map((output) => {
          const draft = state.localEditsByLayoutId[String(output.layout_id)];
          if (!draft) return output;
          return { ...output, content: String(draft.content ?? "") };
        });
      }

      function sortOutputsInPlace() {
        state.outputs.sort((a, b) => {
          const orderCmp = Number(a.reading_order) - Number(b.reading_order);
          if (orderCmp !== 0) return orderCmp;
          return Number(a.layout_id) - Number(b.layout_id);
        });
      }

      function outputByLayoutId(layoutId) {
        return state.outputs.find((output) => Number(output.layout_id) === Number(layoutId)) || null;
      }

      function applySelectedStyles() {
        const selectedId = Number(state.selectedLayoutId);
        for (const row of outputsBody.querySelectorAll("tr[data-layout-id]")) {
          row.classList.toggle("output-selected", Number(row.dataset.layoutId) === selectedId);
        }
        for (const box of sourceOverlay.querySelectorAll(".box[data-layout-id]")) {
          box.classList.toggle("layout-selected", Number(box.dataset.layoutId) === selectedId);
        }
        for (const item of reconstructionSurface.querySelectorAll(".recon-item[data-layout-id]")) {
          item.classList.toggle("recon-selected", Number(item.dataset.layoutId) === selectedId);
        }
      }

      function scrollViewportToLayout(layoutId, viewport, content) {
        if (!viewport || !content) {
          return false;
        }
        const target = computeViewportScrollTargetForLayoutId({
          layoutId,
          layouts: state.outputs.map((output) => ({ id: output.layout_id, bbox: output.bbox })),
          contentWidth: content.clientWidth,
          contentHeight: content.clientHeight,
          viewportWidth: viewport.clientWidth,
          viewportHeight: viewport.clientHeight,
        });
        if (!target) return false;
        viewport.scrollLeft = target.left;
        viewport.scrollTop = target.top;
        return true;
      }

      function scrollVisiblePreviewToLayout(layoutId) {
        let changed = false;
        if (state.panelVisibility.source) {
          changed = scrollViewportToLayout(layoutId, sourceViewport, sourceWrap) || changed;
        }
        if (state.panelVisibility.reconstructed) {
          changed = scrollViewportToLayout(layoutId, reconstructedViewport, reconstructedWrap) || changed;
        }
        return changed;
      }

      function ensureLayoutVisible(layoutId, retries = 8) {
        if (scrollVisiblePreviewToLayout(layoutId)) return;
        if (retries <= 0) return;
        requestAnimationFrame(() => {
          ensureLayoutVisible(layoutId, retries - 1);
        });
      }

      function selectOutput(layoutId, { scrollRowIntoView = false, scrollImageToLayout = false } = {}) {
        const normalized = Number(layoutId);
        if (!Number.isInteger(normalized) || normalized <= 0) return;
        if (!outputByLayoutId(normalized)) return;
        state.selectedLayoutId = normalized;
        applySelectedStyles();
        if (scrollRowIntoView) {
          const row = outputsBody.querySelector(`tr[data-layout-id="${normalized}"]`);
          row?.scrollIntoView({ block: "nearest" });
        }
        if (scrollImageToLayout) {
          ensureLayoutVisible(normalized);
        }
      }

      function boxStyle(bbox) {
        return {
          left: `${Number(bbox.x1) * 100}%`,
          top: `${Number(bbox.y1) * 100}%`,
          width: `${(Number(bbox.x2) - Number(bbox.x1)) * 100}%`,
          height: `${(Number(bbox.y2) - Number(bbox.y1)) * 100}%`,
        };
      }

      function appendPlainContent(container, content, className) {
        const block = document.createElement("div");
        block.className = `recon-item-content ${className}`;
        block.textContent = String(content ?? "");
        container.appendChild(block);
        return block;
      }

      function cloneAllowedTableNode(node) {
        const allowedTags = new Set(["table", "thead", "tbody", "tfoot", "tr", "th", "td", "caption"]);
        if (!(node instanceof Element)) {
          return null;
        }
        const tagName = node.tagName.toLowerCase();
        if (!allowedTags.has(tagName)) {
          return null;
        }
        const cloned = document.createElement(tagName);
        for (const child of Array.from(node.childNodes)) {
          if (child.nodeType === Node.TEXT_NODE) {
            cloned.appendChild(document.createTextNode(child.textContent || ""));
            continue;
          }
          if (!(child instanceof Element)) {
            continue;
          }
          const clonedChild = cloneAllowedTableNode(child);
          if (clonedChild) {
            cloned.appendChild(clonedChild);
          } else {
            cloned.appendChild(document.createTextNode(child.textContent || ""));
          }
        }
        return cloned;
      }

      function appendStructuredContent(container, output) {
        const format = String(output.output_format || "").toLowerCase();
        const content = String(output.content ?? "");
        if (format === "skip") {
          return appendPlainContent(container, "Skipped region (no text extraction).", "skip");
        }
        if (format === "html") {
          const parser = new DOMParser();
          const doc = parser.parseFromString(`<body>${content}</body>`, "text/html");
          const table = doc.body.querySelector("table");
          if (table) {
            const wrapper = document.createElement("div");
            wrapper.className = "recon-item-content html";
            const safeTable = cloneAllowedTableNode(table);
            if (safeTable) {
              wrapper.appendChild(safeTable);
              container.appendChild(wrapper);
              return wrapper;
            }
          }
          return appendPlainContent(container, content, "html");
        }
        if (format === "latex") {
          return appendPlainContent(container, content, "latex");
        }
        return appendPlainContent(container, content, "markdown");
      }

      function estimateLineCount(text, availableWidthPx) {
        const width = Number(availableWidthPx);
        if (!Number.isFinite(width) || width <= 0) {
          return 1;
        }
        const approxCharsPerLine = Math.max(8, Math.floor(width / 7));
        const lines = String(text ?? "").split(/\r?\n/);
        let count = 0;
        for (const line of lines) {
          const length = line.length;
          count += Math.max(1, Math.ceil(length / approxCharsPerLine));
        }
        return Math.max(1, count);
      }

      function contentFitsInItem(contentNode, availableWidth, availableHeight) {
        const maxWidth = Math.ceil(availableWidth + 1);
        const maxHeight = Math.ceil(availableHeight + 1);
        return contentNode.scrollWidth <= maxWidth && contentNode.scrollHeight <= maxHeight;
      }

      function fitReconstructedContent(item, contentNode, output) {
        if (!item || !contentNode || !output) {
          return;
        }
        const format = String(output.output_format || "").toLowerCase();
        if (format === "skip") {
          return;
        }

        const availableWidth = item.clientWidth;
        const availableHeight = item.clientHeight;
        if (availableWidth <= 6 || availableHeight <= 6) {
          return;
        }

        const rawText = String(output.content ?? "");
        const estimatedLines = estimateLineCount(rawText, availableWidth);
        let high = Math.min(42, Math.max(8, availableHeight));
        const estimatedByHeight = Math.floor((availableHeight / Math.max(1, estimatedLines)) * 1.35);
        high = Math.min(high, Math.max(8, estimatedByHeight));
        if (format === "html") {
          high = Math.min(18, Math.max(9, high));
        }
        let low = 6;
        let best = low;
        const lineHeight = format === "latex" ? 1.2 : 1.25;

        for (let i = 0; i < 10; i += 1) {
          const mid = (low + high) / 2;
          contentNode.style.fontSize = `${mid}px`;
          contentNode.style.lineHeight = String(lineHeight);
          if (contentFitsInItem(contentNode, availableWidth, availableHeight)) {
            best = mid;
            low = mid + 0.35;
          } else {
            high = mid - 0.35;
          }
        }

        const finalSize = Math.max(6, Math.min(best, high > 0 ? high : best));
        contentNode.style.fontSize = `${finalSize}px`;
        contentNode.style.lineHeight = String(lineHeight);
      }

      function renderReconstruction() {
        reconstructionSurface.innerHTML = "";
        for (const output of state.outputs) {
          const color = colorForClass(output.class_name);
          const item = document.createElement("div");
          item.className = "recon-item";
          item.dataset.layoutId = String(output.layout_id);
          const style = boxStyle(output.bbox);
          item.style.left = style.left;
          item.style.top = style.top;
          item.style.width = style.width;
          item.style.height = style.height;
          item.style.borderColor = hexToRgba(color, 0.6);
          item.addEventListener("pointerdown", (event) => {
            if (event.button !== 0) return;
            selectOutput(output.layout_id, { scrollRowIntoView: true });
          });

          const contentNode = appendStructuredContent(item, output);
          reconstructionSurface.appendChild(item);
          fitReconstructedContent(item, contentNode, output);
        }
        applySelectedStyles();
      }

      function renderOverlay() {
        sourceOverlay.innerHTML = "";
        for (const output of state.outputs) {
          const color = colorForClass(output.class_name);
          const box = document.createElement("div");
          box.className = "box";
          box.dataset.layoutId = String(output.layout_id);
          const style = boxStyle(output.bbox);
          box.style.left = style.left;
          box.style.top = style.top;
          box.style.width = style.width;
          box.style.height = style.height;
          box.style.borderColor = color;
          box.style.background = hexToRgba(color, 0.16);
          box.addEventListener("pointerdown", (event) => {
            if (event.button !== 0) return;
            selectOutput(output.layout_id, { scrollRowIntoView: true });
          });

          const label = document.createElement("div");
          label.className = "box-label";
          label.style.color = color;
          label.style.borderColor = hexToRgba(color, 0.62);
          label.textContent = `${output.reading_order}. ${formatClassLabel(output.class_name)}`;
          box.appendChild(label);
          sourceOverlay.appendChild(box);
        }
        renderReconstruction();
        applySelectedStyles();
      }

      function updateOutputFromInput(layoutId, textarea) {
        const output = outputByLayoutId(layoutId);
        if (!output) return;
        const nextDraft = { content: String(textarea.value ?? "") };
        output.content = nextDraft.content;
        const baseline = state.serverOutputsByLayoutId[String(layoutId)]
          ? toDraftShape(state.serverOutputsByLayoutId[String(layoutId)])
          : toDraftShape(output);
        if (sameDraft(nextDraft, baseline)) {
          delete state.localEditsByLayoutId[String(layoutId)];
          setStatus("Draft cleared (matches extracted value).");
        } else {
          state.localEditsByLayoutId[String(layoutId)] = nextDraft;
          setStatus("Draft saved locally.");
        }
        renderReconstruction();
        persistDraftState();
      }

      function renderOutputs() {
        sortOutputsInPlace();
        outputsBody.innerHTML = "";
        if (state.outputs.length === 0) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.colSpan = 5;
          cell.className = "empty-state";
          cell.textContent = "No OCR outputs found for this page.";
          row.appendChild(cell);
          outputsBody.appendChild(row);
          return;
        }

        for (const output of state.outputs) {
          const row = document.createElement("tr");
          row.dataset.layoutId = String(output.layout_id);
          row.addEventListener("pointerdown", () => {
            selectOutput(output.layout_id, { scrollImageToLayout: true });
          });

          const orderTd = document.createElement("td");
          orderTd.className = "order-col";
          orderTd.textContent = String(output.reading_order);
          row.appendChild(orderTd);

          const classTd = document.createElement("td");
          classTd.className = "class-col";
          classTd.textContent = formatClassLabel(output.class_name);
          row.appendChild(classTd);

          const formatTd = document.createElement("td");
          formatTd.className = "format-col";
          const formatBadge = document.createElement("span");
          formatBadge.className = "format-badge";
          formatBadge.textContent = output.output_format;
          formatTd.appendChild(formatBadge);
          row.appendChild(formatTd);

          const contentTd = document.createElement("td");
          const textarea = document.createElement("textarea");
          textarea.className = "content-input";
          textarea.value = String(output.content ?? "");
          textarea.disabled = output.output_format === "skip";
          textarea.addEventListener("focus", () => {
            selectOutput(output.layout_id, { scrollImageToLayout: true });
          });
          textarea.addEventListener("input", () => {
            updateOutputFromInput(output.layout_id, textarea);
          });
          contentTd.appendChild(textarea);
          row.appendChild(contentTd);

          const actionsTd = document.createElement("td");
          actionsTd.className = "actions-col";
          const restoreBtn = document.createElement("button");
          restoreBtn.className = "secondary icon-btn";
          restoreBtn.type = "button";
          restoreBtn.textContent = "↺";
          restoreBtn.title = "Restore value";
          restoreBtn.setAttribute("aria-label", "Restore value");
          restoreBtn.disabled = output.output_format === "skip";
          restoreBtn.addEventListener("click", () => {
            const baselineOutput = state.serverOutputsByLayoutId[String(output.layout_id)];
            const baseline = baselineOutput ? toDraftShape(baselineOutput) : { content: "" };
            textarea.value = baseline.content;
            updateOutputFromInput(output.layout_id, textarea);
          });
          actionsTd.appendChild(restoreBtn);
          row.appendChild(actionsTd);

          outputsBody.appendChild(row);
        }

        applySelectedStyles();
      }

      function updateHistoryControls() {
        const prevPageId = previousHistoryPageId(state.history, state.historyIndex);
        historyBackBtn.disabled = !Number.isInteger(prevPageId) || prevPageId <= 0;
        historyBackBtn.title = historyBackBtn.disabled
          ? "No previous reviewed page in history."
          : "Open previous reviewed page";
      }

      function storeHistoryState() {
        writeStorage(STORAGE_KEYS.history, JSON.stringify(state.history));
        writeStorage(STORAGE_KEYS.historyIndex, String(state.historyIndex));
      }

      function loadHistoryState() {
        let parsedHistory = [];
        const rawHistory = readStorage(STORAGE_KEYS.history);
        if (rawHistory) {
          try {
            parsedHistory = JSON.parse(rawHistory);
          } catch {
            parsedHistory = [];
          }
        }
        const rawIndex = readStorage(STORAGE_KEYS.historyIndex);
        const normalized = normalizeReviewHistory(parsedHistory, rawIndex);
        state.history = normalized.history;
        state.historyIndex = normalized.index;
      }

      function updateHistoryOnVisit() {
        const next = updateReviewHistoryOnVisit(state.history, state.historyIndex, state.pageId);
        state.history = next.history;
        state.historyIndex = next.index;
        storeHistoryState();
        updateHistoryControls();
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = payload && payload.detail ? payload.detail : `Request failed: ${response.status}`;
          throw new Error(detail);
        }
        return payload;
      }

      async function loadPageData() {
        const [pagePayload, outputsPayload] = await Promise.all([
          fetchJson(`/api/pages/${state.pageId}`),
          fetchJson(`/api/pages/${state.pageId}/ocr-outputs`),
        ]);
        state.page = pagePayload.page;
        pageImage.src = pagePayload.image_url;
        state.outputs = outputsPayload.outputs || [];
        state.serverOutputsByLayoutId = Object.fromEntries(
          state.outputs.map((output) => [String(output.layout_id), { ...output }]),
        );
        loadDraftState();
        applyDraftsToOutputs();
      }

      async function loadForthAvailability() {
        try {
          const payload = await fetchJson(`/api/pages/${state.pageId}/ocr-review-next`);
          const hasForth = Boolean(payload?.has_next) && Number.isInteger(payload?.next_page_id);
          historyForthBtn.disabled = !hasForth;
          historyForthBtn.title = hasForth ? "Open next page for OCR review" : "No next page for OCR review.";
        } catch {
          historyForthBtn.disabled = true;
          historyForthBtn.title = "Cannot load next page now.";
        }
      }

      async function markReviewed() {
        if (state.reviewSubmitInProgress) return;
        if (state.reextractInProgress) return;
        state.reviewSubmitInProgress = true;
        updateReviewUiState();
        try {
          const changedLayoutIds = Object.keys(state.localEditsByLayoutId)
            .map((value) => Number(value))
            .filter((value) => Number.isInteger(value) && value > 0);
          for (const layoutId of changedLayoutIds) {
            const draft = state.localEditsByLayoutId[String(layoutId)];
            await fetchJson(`/api/ocr-outputs/${layoutId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content: String(draft.content ?? "") }),
            });
          }

          const result = await fetchJson(`/api/pages/${state.pageId}/ocr/review-complete`, {
            method: "POST",
          });
          clearDraftState();
          if (state.page) {
            state.page.status = result.status;
          }
          updateReviewUiState();
          setStatus("OCR review saved.");

          const nextPayload = await fetchJson(`/api/pages/${state.pageId}/ocr-review-next`);
          if (nextPayload && nextPayload.has_next && Number.isInteger(nextPayload.next_page_id)) {
            window.location.href = `/static/ocr_review.html?page_id=${nextPayload.next_page_id}`;
            return;
          }
          setStatus("OCR review saved. No next page for OCR review.");
        } catch (error) {
          setStatus(`OCR review failed: ${error.message}`, { isError: true });
        } finally {
          state.reviewSubmitInProgress = false;
          updateReviewUiState();
        }
      }

      async function reextractContent() {
        if (state.reviewSubmitInProgress || state.reextractInProgress) {
          return;
        }

        state.reextractInProgress = true;
        updateReviewUiState();
        setStatus("Detecting OCR content...");

        const selectedLayoutId = Number(state.selectedLayoutId);
        try {
          const result = await fetchJson(`/api/pages/${state.pageId}/ocr/reextract`, {
            method: "POST",
          });

          clearDraftState();
          await loadPageData();
          renderHeaderMeta();
          renderOutputs();
          renderOverlay();

          if (
            Number.isInteger(selectedLayoutId) &&
            selectedLayoutId > 0 &&
            state.outputs.some((output) => Number(output.layout_id) === selectedLayoutId)
          ) {
            selectOutput(selectedLayoutId, { scrollImageToLayout: true });
          } else if (state.outputs.length > 0) {
            selectOutput(state.outputs[0].layout_id, { scrollImageToLayout: true });
          }
          updateReviewUiState();
          await loadForthAvailability();

          setStatus(
            `Reextraction finished. Extracted: ${result.extracted_count}, skipped: ${result.skipped_count}, requests: ${result.requests_count}.`,
          );
        } catch (error) {
          setStatus(`Reextraction failed: ${error.message}`, { isError: true });
        } finally {
          state.reextractInProgress = false;
          updateReviewUiState();
        }
      }

      function parsePageIdFromUrl() {
        const search = new URLSearchParams(window.location.search);
        const parsed = Number(search.get("page_id"));
        return Number.isInteger(parsed) && parsed > 0 ? parsed : null;
      }

      function renderHeaderMeta() {
        if (!state.page) {
          pageMeta.textContent = "";
          return;
        }
        pageMeta.textContent = `Page #${state.page.id} | ${state.page.rel_path}`;
      }

      async function init() {
        const pageId = parsePageIdFromUrl();
        if (!pageId) {
          setStatus("Missing page_id query parameter.", { isError: true });
          reviewBtn.disabled = true;
          return;
        }

        applyStoredZoomSettings();
        state.panelVisibility = normalizePanelVisibility(readStorage(STORAGE_KEYS.panelVisibility));
        applyPanelVisibility();
        state.pageId = pageId;
        loadHistoryState();
        updateHistoryOnVisit();

        try {
          await loadPageData();
        } catch (error) {
          setStatus(`Failed to load OCR review page: ${error.message}`, { isError: true });
          reviewBtn.disabled = true;
          return;
        }

        renderHeaderMeta();
        renderOutputs();
        renderOverlay();
        if (state.outputs.length > 0) {
          selectOutput(state.outputs[0].layout_id, { scrollImageToLayout: false });
        }
        updateReviewUiState();
        setStatus("Ready.");
        await loadForthAvailability();
      }

      historyBackBtn.addEventListener("click", () => {
        const prevPageId = previousHistoryPageId(state.history, state.historyIndex);
        if (!Number.isInteger(prevPageId) || prevPageId <= 0) return;
        state.historyIndex -= 1;
        storeHistoryState();
        window.location.href = `/static/ocr_review.html?page_id=${prevPageId}`;
      });

      historyForthBtn.addEventListener("click", async () => {
        try {
          const payload = await fetchJson(`/api/pages/${state.pageId}/ocr-review-next`);
          if (!payload || !payload.has_next || !Number.isInteger(payload.next_page_id)) {
            historyForthBtn.disabled = true;
            historyForthBtn.title = "No next page for OCR review.";
            return;
          }
          window.location.href = `/static/ocr_review.html?page_id=${payload.next_page_id}`;
        } catch (error) {
          setStatus(`Failed to open next page: ${error.message}`, { isError: true });
        }
      });

      toggleSourceBtn.addEventListener("click", () => togglePanel("source"));
      toggleReconstructedBtn.addEventListener("click", () => togglePanel("reconstructed"));
      toggleContentBtn.addEventListener("click", () => togglePanel("content"));
      zoomTrigger.addEventListener("click", () => {
        if (zoomMenu.hidden) {
          openZoomMenu();
        } else {
          closeZoomMenu();
        }
      });
      zoomMenu.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) {
          return;
        }
        const option = target.closest(".zoom-option");
        if (!(option instanceof HTMLButtonElement)) {
          return;
        }
        const mode = option.dataset.zoomMode;
        const percent = option.dataset.zoomPercent;
        if (mode) {
          setZoomMode(mode);
        } else if (percent) {
          setCustomZoomPercent(Number(percent));
        }
        closeZoomMenu();
      });
      zoomPercentInput.addEventListener("change", () => {
        applyCustomZoomFromInput();
      });
      zoomPercentInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          applyCustomZoomFromInput();
          zoomPercentInput.blur();
        }
      });
      document.addEventListener("pointerdown", (event) => {
        if (!(event.target instanceof Element)) {
          return;
        }
        if (event.target.closest(".zoom-control")) {
          return;
        }
        closeZoomMenu();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeZoomMenu();
        }
      });

      reextractBtn.addEventListener("click", reextractContent);
      reviewBtn.addEventListener("click", markReviewed);

      pageImage.addEventListener("load", () => {
        applyZoom();
        renderReconstruction();
        if (state.selectedLayoutId !== null) {
          ensureLayoutVisible(state.selectedLayoutId);
        }
      });

      if (typeof ResizeObserver !== "undefined") {
        const viewportResizeObserver = new ResizeObserver(() => {
          if (state.zoomMode !== "custom") {
            applyZoom();
          }
        });
        viewportResizeObserver.observe(sourceViewport);
        viewportResizeObserver.observe(reconstructedViewport);
      } else {
        window.addEventListener("resize", () => {
          if (state.zoomMode !== "custom") {
            applyZoom();
          }
        });
      }

      init().catch((error) => {
        setStatus(`Initialization failed: ${error.message}`, { isError: true });
      });
    </script>
  </body>
</html>
